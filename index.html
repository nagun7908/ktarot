<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1330">
<title>ktaro · 다정한 AI 타로 친구</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --bg:#140f26; --bg2:#1e1640; --panel:#241a45; --panel2:#2c2152;
  --line:#3a2d63; --ink:#f4eeff; --muted:#b7a9d6; --muted2:#8f81b8;
  --gold:#ffd98a; --gold2:#e0b45f; --accent:#8b6dff; --accent2:#6d4aff;
  --rose:#f4a8c4; --up:#9be3b0; --rev:#f4a8b8;
  --bubble:#2a1f4e; --bubbleUser:#5a3fb0;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:"Pretendard",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:
    radial-gradient(120% 60% at 50% -8%, #33245e 0%, var(--bg2) 42%, var(--bg) 78%, #0d0a1c 100%);
  color:var(--ink);min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
/* 별 배경 */
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.stars i{position:absolute;background:#fff;border-radius:50%;opacity:.0;animation:tw 4s infinite ease-in-out}
@keyframes tw{0%,100%{opacity:.15}50%{opacity:.9}}
.app{position:relative;z-index:1;max-width:460px;margin:0 auto;min-height:100vh;
  display:flex;flex-direction:column;padding:0 0 env(safe-area-inset-bottom)}

/* 헤더 */
header{padding:18px 20px 10px;text-align:center;position:sticky;top:0;z-index:20;
  background:linear-gradient(180deg, rgba(20,15,38,.92), rgba(20,15,38,.55) 70%, transparent);
  backdrop-filter:blur(8px)}
.brand{display:flex;align-items:center;justify-content:center;gap:8px}
.brand .logo{font-size:20px}
.brand h1{font-size:19px;font-weight:800;letter-spacing:.02em;
  background:linear-gradient(180deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.brand .beta{font-size:9.5px;font-weight:700;color:var(--gold);border:1px solid var(--gold2);
  border-radius:20px;padding:1px 7px;opacity:.85}
.tag{font-size:11.5px;color:var(--muted);margin-top:3px;letter-spacing:.01em}

/* 채팅 영역 */
.chat{flex:1;padding:8px 16px 12px;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:9px;max-width:100%;animation:rise .45s cubic-bezier(.2,.7,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:19px;background:radial-gradient(circle at 40% 35%, #4a3690, #2a1f52);
  border:1px solid var(--line);box-shadow:0 2px 10px rgba(0,0,0,.3)}
.bubble{background:var(--bubble);border:1px solid var(--line);border-radius:16px;border-top-left-radius:5px;
  padding:12px 14px;font-size:14.5px;line-height:1.72;color:var(--ink);max-width:calc(100% - 44px);
  box-shadow:0 3px 14px rgba(0,0,0,.22)}
.bubble .who{font-size:11px;color:var(--gold);font-weight:700;margin-bottom:3px;letter-spacing:.02em}
.msg.me{justify-content:flex-end}
.msg.me .bubble{background:linear-gradient(160deg,var(--bubbleUser),#4a339a);border-color:#6f52c6;
  border-top-left-radius:16px;border-top-right-radius:5px;color:#fff}
.bubble.wide{max-width:100%}
.dim{color:var(--muted);font-size:13px}

/* 타이핑 인디케이터 */
.typing{display:flex;gap:4px;padding:4px 2px}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bnc 1.1s infinite}
.typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
@keyframes bnc{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

/* 칩/버튼 */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
.chip{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:20px;
  padding:9px 15px;font-size:13.5px;cursor:pointer;transition:.15s;font-family:inherit;font-weight:500}
.chip:active{transform:scale(.96)}
.chip.on{background:linear-gradient(180deg,var(--gold),var(--gold2));color:#3a2905;border-color:var(--gold2);font-weight:700}
.chip.ghost{background:transparent;color:var(--muted);border-style:dashed}

/* 카드 배치 */
.boardblock{width:auto;margin:2px -14px;padding:2px 4px;animation:rise .45s cubic-bezier(.2,.7,.2,1)}
.spread{margin:6px 0 2px}
.spread .lbl{font-size:12px;color:var(--gold);text-align:center;margin-bottom:10px;letter-spacing:.05em;font-weight:700}
.grid{display:grid;gap:10px;justify-content:center}
.g1{grid-template-columns:1fr;max-width:250px;margin:0 auto}
.g3{grid-template-columns:repeat(3,1fr);gap:9px}
.slot{display:flex;flex-direction:column;align-items:center;gap:7px}
.pos{font-size:11.5px;color:var(--muted);text-align:center;min-height:15px;font-weight:600;letter-spacing:.02em}
.frame{width:100%;aspect-ratio:1/1.72;perspective:900px;cursor:pointer;max-width:250px}
.g3 .frame{max-width:none}
.flipper{position:relative;width:100%;height:100%;transform-style:preserve-3d;
  transition:transform .8s cubic-bezier(.2,.75,.2,1)}
.frame.flip .flipper{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:11px;overflow:hidden;border:1px solid var(--line)}
.back{background:
    radial-gradient(circle at 50% 42%, rgba(255,217,138,.16), transparent 60%),
    repeating-linear-gradient(45deg,#302456 0 7px,#271d47 7px 14px);
  border:1px solid var(--gold2);display:flex;align-items:center;justify-content:center}
.back::after{content:"✦";font-size:30px;color:var(--gold);text-shadow:0 0 16px rgba(255,217,138,.6)}
.front{transform:rotateY(180deg);background:#000}
.front img{width:100%;height:100%;object-fit:cover;display:block}
.front img.rev{transform:rotate(180deg)}
.revtag{position:absolute;top:5px;right:5px;background:rgba(244,168,184,.94);color:#3a0d18;
  font-size:9px;font-weight:800;padding:1px 6px;border-radius:20px;z-index:2}
.cname{font-size:11.5px;font-weight:700;text-align:center;min-height:15px;line-height:1.3}
.cname .r{color:var(--rev)}.cname .u{color:var(--up)}

/* 켈틱 */
.celtic{display:grid;grid-template-columns:repeat(4,1fr);gap:10px 7px;max-width:100%}
.celtic .frame{max-width:none}
.celtic .cname{font-size:9.5px}.celtic .pos{font-size:9px;min-height:24px;line-height:1.25}

/* 셔플 애니메이션 */
.shuffle{position:relative;height:170px;display:flex;justify-content:center;align-items:center}
.shuffle .sc{position:absolute;width:96px;height:165px;border-radius:11px;
  background:radial-gradient(circle at 50% 42%, rgba(255,217,138,.18), transparent 60%),
    repeating-linear-gradient(45deg,#302456 0 7px,#271d47 7px 14px);
  border:1px solid var(--gold2);box-shadow:0 6px 18px rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;transform-origin:bottom center}
.shuffle .sc::after{content:"✦";color:var(--gold);font-size:22px;opacity:.85}
.shuffle .sc:nth-child(1){animation:shf 1.3s ease-in-out infinite}
.shuffle .sc:nth-child(2){animation:shf 1.3s ease-in-out infinite .1s}
.shuffle .sc:nth-child(3){animation:shf 1.3s ease-in-out infinite .2s}
.shuffle .sc:nth-child(4){animation:shf 1.3s ease-in-out infinite .3s}
.shuffle .sc:nth-child(5){animation:shf 1.3s ease-in-out infinite .4s}
@keyframes shf{
  0%{transform:translateX(0) rotate(0deg)}
  25%{transform:translateX(-64px) rotate(-14deg)}
  50%{transform:translateX(0) rotate(0deg)}
  75%{transform:translateX(64px) rotate(14deg)}
  100%{transform:translateX(0) rotate(0deg)}
}
/* 딜(카드가 날아와 자리잡는) 효과 */
.frame.deal{animation:deal .5s cubic-bezier(.2,.8,.2,1) both}
@keyframes deal{from{opacity:0;transform:translateY(-30px) scale(.85)}to{opacity:1;transform:none}}
.cc{grid-column:2/3;grid-row:1/4;display:flex;align-items:center;justify-content:center;position:relative}
.cc .ci{position:relative;width:100%}
.cc .ci .a{position:relative;z-index:1}
.cc .ci .b{position:absolute;top:42%;left:50%;width:78%;transform:translate(-50%,-50%) rotate(90deg);z-index:2}

/* 입력바 */
.inputbar{position:sticky;bottom:0;z-index:20;padding:10px 14px calc(12px + env(safe-area-inset-bottom));
  background:linear-gradient(0deg, rgba(20,15,38,.96) 60%, transparent);display:flex;gap:8px;align-items:flex-end}
.inputbar textarea{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:20px;color:var(--ink);
  padding:12px 15px;font-size:15px;font-family:inherit;resize:none;max-height:110px;line-height:1.5;outline:none}
.inputbar textarea::placeholder{color:var(--muted2)}
.inputbar textarea:focus{border-color:var(--accent)}
.send{width:46px;height:46px;flex-shrink:0;border:0;border-radius:50%;cursor:pointer;
  background:linear-gradient(160deg,var(--gold),var(--gold2));color:#3a2905;font-size:19px;
  display:flex;align-items:center;justify-content:center;transition:.15s}
.send:active{transform:scale(.92)}
.send:disabled{opacity:.4;cursor:default}

/* 결과 액션 */
.acts{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.act{flex:1;min-width:120px;background:var(--panel);border:1px solid var(--line);color:var(--ink);
  border-radius:12px;padding:11px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;
  display:flex;align-items:center;justify-content:center;gap:6px}
.act:active{transform:scale(.97)}
.act.primary{background:linear-gradient(160deg,var(--accent),var(--accent2));border-color:var(--accent);color:#fff}

/* 리딩 상세 */
.read h4{font-size:14px;margin:2px 0 5px;color:var(--gold)}
.read .kv{font-size:12px;color:var(--muted);margin-bottom:7px}
.read .kv b{color:var(--gold2)}
.read .sec{margin-top:12px;padding-top:11px;border-top:1px dashed var(--line)}
.ori{font-size:10.5px;font-weight:800;padding:1px 7px;border-radius:20px;margin-left:5px;vertical-align:1px}
.ori.u{background:rgba(155,227,176,.16);color:var(--up)}.ori.r{background:rgba(244,168,184,.16);color:var(--rev)}
.disclaimer{font-size:11px;color:var(--muted2);text-align:center;padding:14px 20px 6px;line-height:1.6}

/* 홈(메인) 화면 */
.homebtn{position:absolute;left:16px;top:16px;width:34px;height:34px;border-radius:50%;
  background:var(--panel);border:1px solid var(--line);color:var(--ink);font-size:15px;cursor:pointer;
  display:none;align-items:center;justify-content:center}
.home{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:24px 24px 40px;gap:4px;min-height:calc(100vh - 40px)}
.home .moon{font-size:58px;filter:drop-shadow(0 0 26px rgba(255,217,138,.45));animation:float 5s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.home .cat{font-size:34px;margin-top:2px}
.home h2{font-size:34px;font-weight:800;letter-spacing:.04em;margin-top:8px;
  background:linear-gradient(180deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.home .lead{color:var(--muted);font-size:14.5px;line-height:1.7;margin:10px 4px 26px;max-width:300px}
.home .lead b{color:var(--gold)}
.home .cta{width:100%;max-width:320px;display:flex;flex-direction:column;gap:11px}
.bigbtn{width:100%;border:0;border-radius:16px;padding:17px;font-size:16px;font-weight:800;cursor:pointer;
  font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s;letter-spacing:.01em}
.bigbtn:active{transform:scale(.97)}
.bigbtn.p{background:linear-gradient(160deg,var(--gold),var(--gold2));color:#3a2905;
  box-shadow:0 8px 26px rgba(255,217,138,.28)}
.bigbtn.s{background:var(--panel);border:1px solid var(--line);color:var(--ink)}
.home .menu{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;justify-content:center}
.home .menu .mchip{background:transparent;border:1px solid var(--line);color:var(--muted);
  border-radius:20px;padding:9px 14px;font-size:12.5px;cursor:pointer;font-family:inherit;transition:.15s}
.home .menu .mchip:active{transform:scale(.95);color:var(--ink)}
.home .foot{margin-top:30px;font-size:11px;color:var(--muted2);line-height:1.6;max-width:300px}

/* 공유 카드 오버레이 */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(8,6,18,.86);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;padding:20px;flex-direction:column;gap:14px}
.overlay.show{display:flex;animation:rise .3s}
.overlay canvas{width:min(78vw,290px);height:auto;border-radius:16px;box-shadow:0 16px 50px rgba(0,0,0,.6)}
.overlay .obtns{display:flex;gap:10px}
.overlay .obtn{background:var(--gold);color:#3a2905;border:0;border-radius:12px;padding:12px 20px;font-weight:800;
  font-size:14px;cursor:pointer;font-family:inherit}
.overlay .obtn.g{background:var(--panel);color:var(--ink);border:1px solid var(--line)}
.hidden{display:none!important}
::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<div class="app">
  <header>
    <button class="homebtn" id="homeBtn" title="홈으로">🏠</button>
    <div class="brand">
      <span class="logo">🌙</span>
      <h1>ktaro</h1>
      <span class="beta">BETA</span>
    </div>
    <div class="tag">잠들기 전 마음이 복잡할 때, 다정한 타로 친구</div>
  </header>

  <!-- 메인(홈) 화면 -->
  <section class="home" id="home">
    <div class="moon">🌙</div>
    <div class="cat">🐈‍⬛</div>
    <h2>ktaro</h2>
    <p class="lead">밤에 찾아오는 다정한 타로 친구 <b>묘묘</b>가<br>당신의 마음을 카드로 함께 들여다봐요.</p>
    <div class="cta">
      <button class="bigbtn p" id="startBtn">🔮 타로 리딩 시작하기</button>
      <button class="bigbtn s" id="dailyBtn">🌅 오늘의 카드 바로 뽑기</button>
    </div>
    <div class="menu">
      <button class="mchip" data-sp="three">과거·현재·미래 3장</button>
      <button class="mchip" data-sp="celtic">켈틱 크로스 10장</button>
    </div>
    <div class="foot">✦ ktaro는 미래를 맞히는 점집이 아니라, 마음을 함께 들여다보는 친구예요. 재미와 참고용으로 즐겨주세요.</div>
  </section>

  <div class="chat hidden" id="chat"></div>

  <div class="inputbar hidden" id="inputbar">
    <textarea id="input" rows="1" placeholder="고민이나 궁금한 걸 편하게 적어줘…"></textarea>
    <button class="send" id="send">➤</button>
  </div>

  <div class="disclaimer hidden" id="disc">
    ✦ ktaro는 정해진 미래를 맞히는 점집이 아니라, 마음을 함께 들여다보는 다정한 친구예요. 재미와 참고용으로 즐겨주세요.
  </div>
</div>

<!-- 공유 카드 오버레이 -->
<div class="overlay" id="overlay">
  <canvas id="shareCanvas" width="1080" height="1920"></canvas>
  <div class="obtns">
    <button class="obtn" id="dlBtn">이미지 저장</button>
    <button class="obtn g" id="closeOv">닫기</button>
  </div>
</div>

<script>
/* =====================================================================
   ktaro 로컬 해석 엔진 (Tier 1)
   - 해석 DB: 78장 × 정/역 × 주제(연애·커리어·금전·종합)
   - 템플릿 조합 엔진: [공감 인트로]+[카드 연출]+[코어 해석]+[주제 조언]+[다정한 마무리]
   - 결정론적 오늘의 카드: hash(닉네임+날짜) → 카드/방향
   - 카드 간 연결 문장: 정/역 전환 규칙
   런타임 LLM 호출 없음 · 변동원가 0원
   ===================================================================== */

/* ---------- 별 배경 ---------- */
(function(){const s=document.getElementById('stars');let h='';
 for(let i=0;i<46;i++){const sz=Math.random()*2+1;
   h+=`<i style="left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;animation-delay:${Math.random()*4}s"></i>`;}
 s.innerHTML=h;})();

/* ---------- 해석 DB ---------- */
// 메이저 아르카나: [정,역] 각각 {b:종합, l:연애, w:커리어, m:금전}
const MAJOR = [
 {n:"바보",en:"The Fool",f:"0. 바보 카드.jpg",kw:"새로운 시작·순수·모험·자유",
  u:{b:"두려움 없이 새 여정을 시작할 때예요. 계산보다 순수한 마음과 직관을 믿어도 좋아요.",l:"조건을 따지기보다 마음이 이끄는 대로, 설레는 시작을 열어도 괜찮은 흐름이에요.",w:"익숙함을 벗어나 새로운 분야에 도전해볼 만한 시기예요. 열린 마음이 기회를 불러와요.",m:"과감한 새 시도가 어울리는 때예요. 다만 큰 지출은 한 번 더 살펴보면 좋아요."},
  r:{b:"설렘이 앞서 준비가 부족할 수 있어요. 잠시 멈춰 현실을 점검하면 발이 덜 걸려요.",l:"즉흥적인 마음이 관계를 불안정하게 만들 수 있으니 속도를 조금 늦춰봐요.",w:"계획 없이 뛰어들면 힘이 빠질 수 있어요. 방향을 먼저 정하는 게 도움이 돼요.",m:"충동적인 지출을 조심할 시기예요. 지금은 지갑을 지키는 쪽이 유리해요."}},
 {n:"마법사",en:"The Magician",f:"1. 마법사 카드.jpg",kw:"의지·창조·실행력·재능",
  u:{b:"원하는 걸 현실로 만들 자원과 재능이 이미 당신 안에 있어요. 집중해서 지금 움직이면 이뤄져요.",l:"원하는 관계를 스스로 만들어갈 힘이 있어요. 먼저 다가가는 용기가 통해요.",w:"재능을 발휘해 주도적으로 이끌 때예요. 당신의 실행력이 결과를 만들어요.",m:"기회를 현실적 성과로 바꿀 수 있는 흐름이에요. 아이디어를 실행에 옮겨봐요."},
  r:{b:"가진 재능을 잔재주로 흘려보내거나 스스로를 속이고 있진 않은지 돌아봐요.",l:"말과 매력만 앞서는 관계일 수 있어요. 진심을 확인해봐요.",w:"실력은 있는데 방향이 흩어져 있어요. 핵심 하나에 집중해봐요.",m:"과장된 계획이나 허황된 기대를 경계할 때예요."}},
 {n:"여사제",en:"The High Priestess",f:"2. 여사제 카드.jpg",kw:"직관·내면·비밀·지혜",
  u:{b:"답은 밖이 아니라 당신 직관 속에 있어요. 서두르지 말고 고요히 마음의 소리를 들어봐요.",l:"말보다 마음으로 통하는 관계예요. 은근한 끌림과 깊은 이해가 있어요.",w:"드러난 것 너머를 읽는 통찰이 필요한 때예요. 신중히 관찰해봐요.",m:"성급하기보다 신중한 판단이 어울려요. 아직 드러나지 않은 정보가 있어요."},
  r:{b:"직관을 애써 무시하거나 감정을 눌러두고 있어요. 마음의 신호에 귀 기울여봐요.",l:"서로 속내를 감추고 있어 오해가 쌓일 수 있어요.",w:"감춰진 정보나 뒷이야기가 변수예요. 사실 확인이 필요해요.",m:"불투명한 거래나 숨은 조건을 조심할 시기예요."}},
 {n:"여황제",en:"The Empress",f:"3. 여황제 카드.jpg",kw:"풍요·사랑·창조·모성",
  u:{b:"풍요와 사랑이 흘러넘치는 시기예요. 돌봄과 창의력이 결실을 맺어요.",l:"사랑이 무르익고 관계가 따뜻하게 자라나요. 애정을 표현하기 좋은 때예요.",w:"창의력과 협업이 결실로 이어져요. 정성을 들인 만큼 돌아와요.",m:"수입과 풍요가 늘어나는 흐름이에요. 여유가 생겨요."},
  r:{b:"과하게 돌보거나 의존하며 자신을 놓칠 수 있어요. 스스로를 먼저 챙겨봐요.",l:"집착이나 지나친 헌신이 관계를 무겁게 할 수 있어요.",w:"창조적 에너지가 잠시 막혀 있어요. 재충전이 필요해요.",m:"과소비나 낭비를 살펴볼 시기예요."}},
 {n:"황제",en:"The Emperor",f:"4. 황제 카드.jpg",kw:"권위·안정·구조·리더십",
  u:{b:"질서와 규율로 기반을 단단히 다질 때예요. 책임감 있는 태도가 성공을 불러요.",l:"안정적이고 든든한 관계예요. 믿음직한 사람과의 진지한 연결이에요.",w:"체계와 리더십이 빛나는 시기예요. 계획대로 밀고 나가면 인정받아요.",m:"안정적으로 재정을 관리하기 좋은 때예요. 원칙을 지키면 든든해져요."},
  r:{b:"지나친 통제나 고집이 유연함을 막고 있어요. 힘을 조금 풀어봐요.",l:"통제하려는 태도가 관계를 답답하게 할 수 있어요.",w:"경직된 방식이나 권위 다툼이 걸림돌이에요.",m:"융통성 없는 운용이 기회를 놓치게 할 수 있어요."}},
 {n:"교황",en:"The Hierophant",f:"5. 교황 카드.jpg",kw:"전통·가르침·신념·제도",
  u:{b:"검증된 방식과 좋은 조언에서 답을 찾을 때예요. 배움과 멘토가 든든한 힘이 돼요.",l:"진지하고 안정적인 관계, 약속이나 공식적인 인연을 뜻해요.",w:"정석대로, 멘토의 조언을 따르는 것이 유리한 시기예요.",m:"검증된 안전한 방식이 어울려요. 무리한 모험은 피해요."},
  r:{b:"틀에 박힌 관습보다 나만의 길을 찾고 싶은 마음이에요. 형식을 깨도 괜찮아요.",l:"관습에서 벗어난 자유로운 관계일 수 있어요.",w:"기존 방식에 얽매이지 않는 새 접근이 필요해요.",m:"관행을 벗어난 시도를 고민해볼 때예요."}},
 {n:"연인",en:"The Lovers",f:"6. 연인 카드.jpg",kw:"사랑·선택·조화·결합",
  u:{b:"깊은 유대와 진실한 선택의 순간이에요. 마음이 하나 되는 조화를 뜻해요.",l:"깊은 사랑과 좋은 궁합이에요. 마음이 잘 맞는 소중한 인연이에요.",w:"가치관이 맞는 협업, 좋은 파트너십의 시기예요.",m:"중요한 선택 앞에 있어요. 마음이 향하는 쪽을 신중히 골라봐요."},
  r:{b:"가치관 충돌이나 균형이 깨진 관계를 살펴볼 때예요.",l:"불화나 유혹, 마음의 엇갈림이 보여요. 진심을 다시 확인해봐요.",w:"협업에서 의견 충돌이 생길 수 있어요.",m:"성급한 선택을 경계할 시기예요."}},
 {n:"전차",en:"The Chariot",f:"7. 전차 카드.jpg",kw:"의지·승리·추진력·통제",
  u:{b:"강한 의지와 집중으로 장애를 돌파하고 승리해요. 목표를 향해 전진할 때예요.",l:"적극적으로 다가가 마음을 얻는 흐름이에요.",w:"추진력으로 목표를 달성해요. 밀어붙이면 성과가 나요.",m:"과감한 결단이 성취로 이어지는 시기예요."},
  r:{b:"방향을 잃거나 통제력이 흔들려요. 조급함을 다스리면 다시 길이 보여요.",l:"감정에 휘둘려 관계가 흔들릴 수 있어요.",w:"조급하게 밀어붙이다 헛돌 수 있어요. 방향부터 잡아봐요.",m:"무리한 추진은 손해로 이어질 수 있어요."}},
 {n:"힘",en:"Strength",f:"8. 힘 카드.jpg",kw:"용기·인내·부드러운 힘·자제",
  u:{b:"완력이 아닌 부드러움과 인내로 상황을 다스려요. 내면의 용기가 진짜 힘이에요.",l:"다정함으로 상대를 감싸며 신뢰를 쌓는 관계예요.",w:"끈기와 침착함으로 어려움을 이겨내는 시기예요.",m:"조급하지 않은 인내가 재정을 지켜줘요."},
  r:{b:"자신감이 흔들리거나 감정에 휘둘리기 쉬워요. 스스로에 대한 믿음을 회복해봐요.",l:"감정 폭발이나 불안이 관계를 흔들 수 있어요.",w:"두려움에 위축되지 않도록 마음을 다잡아봐요.",m:"자제력이 흐트러질 수 있으니 주의해요."}},
 {n:"은둔자",en:"The Hermit",f:"9. 은둔자 카드.jpg",kw:"성찰·고독·탐구·내면의 빛",
  u:{b:"홀로 물러나 내면을 성찰할 시간이에요. 고요 속에서 스스로 길을 밝혀요.",l:"혼자만의 시간이 필요한 때예요. 서두르지 않아도 돼요.",w:"깊이 파고들며 전문성을 다지기 좋은 시기예요.",m:"신중하게 점검하고 계획을 정비할 때예요."},
  r:{b:"고립이나 외로움에 갇혀 있진 않은지 살펴봐요. 필요한 도움은 받아도 돼요.",l:"지나친 거리두기가 관계를 멀어지게 할 수 있어요.",w:"혼자 짊어지기보다 도움을 청해봐요.",m:"폐쇄적인 태도가 기회를 막을 수 있어요."}},
 {n:"운명의 수레바퀴",en:"Wheel of Fortune",f:"10. 운명의 수레바퀴.jpg",kw:"변화·순환·운명·전환점",
  u:{b:"운명의 흐름이 당신에게 유리하게 돌아서요. 변화를 받아들이면 새 기회가 열려요.",l:"운명적인 만남이나 관계의 반가운 전환이 있어요.",w:"기회의 사이클이 돌아오는 시기예요. 흐름을 타봐요.",m:"재정 흐름이 좋은 쪽으로 바뀌는 전환점이에요."},
  r:{b:"통제 밖의 변화나 잠깐의 하락이 있을 수 있어요. 흐름에 유연하게 대응해봐요.",l:"타이밍이 엇갈릴 수 있어요. 조급해하지 말아요.",w:"예기치 못한 변수가 생길 수 있어요.",m:"재정 변동이 있으니 대비해두면 좋아요."}},
 {n:"정의",en:"Justice",f:"11. 정의 카드.jpg",kw:"공정·진실·책임·인과",
  u:{b:"공정한 결과와 진실이 드러나요. 균형 잡힌 판단이 정당한 보상을 가져와요.",l:"서로 존중하는 균형 잡힌 관계예요. 솔직함이 신뢰를 만들어요.",w:"노력에 대한 정당한 평가를 받는 시기예요.",m:"공정한 정산, 계약이 유리하게 마무리돼요."},
  r:{b:"불공정하거나 책임을 회피하고 있진 않은지 돌아봐요.",l:"한쪽으로 기운 불균형한 관계를 살펴볼 때예요.",w:"부당한 대우나 평가가 있을 수 있어요.",m:"계약이나 정산에서 꼼꼼함이 필요해요."}},
 {n:"행맨(매달린 사람)",en:"The Hanged Man",f:"12. 행맨 카드.jpg",kw:"멈춤·관점 전환·희생·인내",
  u:{b:"잠시 멈춰 다른 각도로 바라볼 때예요. 놓아버림 속에서 새 깨달음이 와요.",l:"기다림이 필요한 관계예요. 억지로 당기지 않는 게 나아요.",w:"잠시 보류하고 관점을 바꾸면 실마리가 보여요.",m:"큰 결정이나 지출은 잠시 미뤄두는 게 좋아요."},
  r:{b:"소모적인 희생이나 미루기를 이제 내려놓을 때예요.",l:"일방적인 헌신이 지치게 하고 있어요.",w:"정체된 상황을 붙들고만 있진 않은지 살펴봐요.",m:"손해를 감수만 하는 상태를 정리해봐요."}},
 {n:"죽음",en:"Death",f:"13. 죽음 카드.jpg",kw:"끝과 시작·변형·전환·해방",
  u:{b:"한 장이 끝나고 완전히 새 국면이 시작돼요. 낡은 걸 떠나보내면 재생이 와요.",l:"관계의 큰 전환이나 새로운 단계로의 변화예요.",w:"국면을 정리하고 새롭게 시작하는 시기예요.",m:"재정 구조를 크게 개편하기 좋은 때예요."},
  r:{b:"놓아야 할 것을 붙들고 있어 변화가 막혀 있어요.",l:"이미 끝난 관계에 미련을 두고 있진 않은지 돌아봐요.",w:"변화를 거부하다 정체될 수 있어요.",m:"낡은 방식을 못 놓아 기회를 놓칠 수 있어요."}},
 {n:"절제",en:"Temperance",f:"14. 절제 카드.jpg",kw:"균형·조화·중용·치유",
  u:{b:"극단을 조화시키는 균형과 인내의 시기예요. 천천히 조율하면 치유가 와요.",l:"서로 맞춰가며 안정을 이루는 조화로운 관계예요.",w:"조율과 협업으로 좋은 결과를 만드는 때예요.",m:"균형 잡힌 지출과 저축이 어울려요."},
  r:{b:"삶의 리듬이 흐트러졌어요. 과함을 덜고 균형을 되찾아봐요.",l:"감정이 과열되거나 엇박자가 날 수 있어요.",w:"페이스가 무너져 있어요. 속도를 조절해봐요.",m:"과소비나 낭비를 조심할 시기예요."}},
 {n:"악마",en:"The Devil",f:"15. 악마 카드.jpg",kw:"속박·집착·유혹·그림자",
  u:{b:"무엇이 당신을 묶고 있는지 비춰줘요. 직시하면 사슬은 스스로 풀 수 있어요.",l:"강한 끌림 이면의 집착이나 의존을 살펴볼 때예요.",w:"매너리즘이나 벗어나기 힘든 상황에 묶여 있어요.",m:"과욕이나 습관적 지출에 주의할 시기예요."},
  r:{b:"속박에서 벗어나 자유를 되찾는 흐름이에요. 나쁜 습관을 끊는 각성이 와요.",l:"건강하지 못한 관계를 끊어낼 힘이 생겨요.",w:"답답한 굴레에서 벗어나는 전환이에요.",m:"빚이나 중독적 지출을 정리하는 때예요."}},
 {n:"타워",en:"The Tower",f:"16. 타워 카드.jpg",kw:"급변·붕괴·각성·해방",
  u:{b:"낡은 구조가 갑자기 무너져요. 충격적이지만 거짓된 기반을 허무는 계기예요.",l:"관계에 갑작스러운 변화가 올 수 있어요. 진실이 드러나요.",w:"예상 밖의 변동이 있지만, 새로 세울 기회이기도 해요.",m:"예기치 못한 지출이 생길 수 있으니 대비해둬요."},
  r:{b:"피할 수 없는 변화를 두려워하며 미루고 있어요. 조금씩 겪어내면 돼요.",l:"위기를 서서히 지나는 중이에요.",w:"변화를 미루다 부담이 커질 수 있어요.",m:"재정 충격을 완화하려는 노력이 필요해요."}},
 {n:"별",en:"The Star",f:"17. 별 카드.jpg",kw:"희망·치유·영감·믿음",
  u:{b:"어둠 뒤에 찾아온 희망과 치유의 빛이에요. 미래에 대한 믿음이 회복돼요.",l:"희망 어린 관계, 마음이 편안해지는 인연이에요.",w:"비전과 영감이 되살아나는 시기예요.",m:"상황이 서서히 나아지는 흐름이에요."},
  r:{b:"잠시 빛이 가려져 낙담할 수 있어요. 믿음은 다시 회복할 수 있어요.",l:"자신감이 떨어져 관계에 소극적일 수 있어요.",w:"의욕이 잠시 식었어요. 작은 성취부터 쌓아봐요.",m:"불안이나 비관에 휩쓸리지 않도록 해봐요."}},
 {n:"달",en:"The Moon",f:"18. 달 카드.jpg",kw:"불안·환상·무의식·직관",
  u:{b:"아직 명확하지 않은 상황이에요. 두려움과 환상을 구분하며 천천히 나아가봐요.",l:"애매하고 불안한 기류예요. 확신이 서지 않는 관계일 수 있어요.",w:"불투명한 상황이니 성급한 판단은 미뤄봐요.",m:"확실하지 않은 정보에 기대지 않는 게 좋아요."},
  r:{b:"혼란이 걷히고 진실이 드러나기 시작해요. 오해가 풀려요.",l:"쌓였던 오해가 풀리며 마음이 놓여요.",w:"불투명하던 상황이 명료해져요.",m:"숨어 있던 문제가 드러나 정리할 수 있어요."}},
 {n:"태양",en:"The Sun",f:"19. 태양 카드.jpg",kw:"기쁨·성공·활력·명료함",

/* ---------- 유틸 ---------- */
function pick(arr,seed){ // seed 있으면 결정론적, 없으면 랜덤
  if(seed===undefined) return arr[Math.floor(Math.random()*arr.length)];
  const i=((Math.floor(seed)%arr.length)+arr.length)%arr.length; // 음수 시드 안전 처리
  return arr[i];
}
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return (h>>>0);}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;}
function coreOf(card,rev,theme){const k=THEMES[theme].key;return (rev?card.r:card.u)[k];}

/* ---------- 리딩 텍스트 생성 (완결형) ---------- */
function buildSingleReading(card,rev,theme,seed){
  const t=theme;
  const intro=pick(BANK.intro[t], seed!==undefined?seed:undefined);
  const draw=pick(BANK.draw, seed!==undefined?(seed>>3):undefined);
  const core=coreOf(card,rev,t);
  const adv=pick(BANK.advice[t][rev?'r':'u'], seed!==undefined?(seed>>6):undefined);
  const outro=pick(BANK.outro, seed!==undefined?(seed>>9):undefined);
  return {intro,draw,core,adv,outro};
}

}

/* 리버스 토글 상태(기본 포함) */
let allowReversed=true;

/* ---------- 뽑기 & 렌더 ---------- */
const SPREADS={
  one:{n:1,label:"오늘의 카드",pos:["오늘의 메시지"]},
  three:{n:3,label:"과거 · 현재 · 미래",pos:["과거","현재","미래"]},
  celtic:{n:10,label:"켈틱 크로스",pos:["현재 상황","도전·장애","무의식·뿌리","과거","목표·의식","가까운 미래","나의 태도","주변·환경","희망과 두려움","최종 결과"]}
};

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function drawSpread(){
  const sp=SPREADS[state.spread];
  // 오늘의 카드: 결정론적
  if(state.spread==="one"){
    const seedBase=hashStr((state.nickname||"guest")+"|"+todayStr());
    const idx=seedBase%DECK.length;
    const rev=allowReversed?((seedBase>>5)%100<42):false;
    return [{card:DECK[idx],rev,pos:sp.pos[0],seed:seedBase}];
  }
  const pool=shuffle([...DECK]).slice(0,sp.n);
  return pool.map((c,i)=>({card:c,rev:allowReversed?Math.random()<0.42:false,pos:sp.pos[i]}));
}

function frameHTML(item,idx){
  const c=item.card;const rev=item.rev;
  return `<div class="slot">
    <div class="pos">${item.pos}</div>
    <div class="frame" data-idx="${idx}">
      <div class="flipper">
        <div class="face back"></div>
        <div class="face front">${rev?'<span class="revtag">역</span>':''}
          <img src="${encodeURI(c.file)}" alt="${c.name}" class="${rev?'rev':''}" onerror="imgFail(this)">
        </div>
      </div>
    </div>
    <div class="cname" data-name="${idx}"></div>
  </div>`;
}
function imgFail(img){img.style.display='none';const f=img.closest('.front');
  f.style.cssText+='display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:10px;text-align:center;padding:6px';
  f.insertAdjacentHTML('beforeend',`<div>${img.alt}</div>`);}

function wait(ms){return new Promise(r=>setTimeout(r,ms));}
function appendBlock(html){const d=document.createElement('div');d.className='boardblock';d.innerHTML=html;chat.appendChild(d);scrollDown();return d;}

let flipped=0;
async function presentCards(){
  const sp=SPREADS[state.spread];
  await botThen(`${pick(BANK.intro[state.theme])}`,650);
  // 셔플 애니메이션
  const shu=appendBlock(`<div class="shuffle"><div class="sc"></div><div class="sc"></div><div class="sc"></div><div class="sc"></div><div class="sc"></div></div><div class="dim" style="text-align:center;margin-top:2px">카드를 섞고 있어… 🔮</div>`);
  await wait(1700);
  shu.remove();
  // 카드 보드 (풀폭 블록)

  if(state.spread==="celtic"){
    boardHTML=celticHTML();

    const cls=sp.n===1?'g1':'g3';

function celticHTML(){
  const d=state.drawn;const s=(i)=>frameHTML(d[i],i);
  return `<div class="spread"><div class="lbl">켈틱 크로스</div><div class="celtic">
    <div style="grid-column:1;grid-row:2">${s(3)}</div>
    <div class="cc"><div class="ci"><div class="a">${s(0)}</div><div class="b">${s(1)}</div></div></div>
    <div style="grid-column:2;grid-row:1;align-self:start">${s(4)}</div>
    <div style="grid-column:2;grid-row:3;align-self:end">${s(2)}</div>
    <div style="grid-column:3;grid-row:2">${s(5)}</div>
    <div style="grid-column:4;grid-row:1">${s(9)}</div>
    <div style="grid-column:4;grid-row:2">${s(8)}</div>

function flipCard(fr){
  if(fr.classList.contains('flip'))return;
  fr.classList.add('flip');
  const idx=+fr.dataset.idx;const it=state.drawn[idx];
  const blk=fr.closest('.boardblock');
  const nm=blk?blk.querySelector(`.cname[data-name="${idx}"]`):null;
  if(nm)nm.innerHTML=`<span class="${it.rev?'r':'u'}">${it.card.name}${it.rev?' (역)':''}</span>`;
  flipped++;
  if(flipped>=state.drawn.length){setTimeout(deliverReading,650);}
}

/* ---------- 최종 해석 전달 ---------- */
async function deliverReading(){
  const t=state.theme;
  if(state.spread==="one"){
    const it=state.drawn[0];
    const r=buildSingleReading(it.card,it.rev,t,it.seed);
    await botThen(`${r.intro}`,700);
    await botThen(`${r.draw} <b>${it.card.name}</b>${it.rev?' <span class="ori r">역방향</span>':' <span class="ori u">정방향</span>'} 카드야.`,850);
    await botThen(`${r.core}`,900);
    await botThen(`${r.adv}`,850);
    await botThen(`${r.outro}`,700);
  } else {
    await botThen(`카드들이 그리는 흐름을 읽어볼게. 🔮`,800);
    let prev=null;
    for(let i=0;i<state.drawn.length;i++){
      const it=state.drawn[i];
      const core=coreOf(it.card,it.rev,t);
      let conn="";
      if(prev!==null){const key=(prev?'r':'u')+(it.rev?'r':'u');conn=`<span class="dim">${BANK.connect[key]}</span><br>`;}
      await botThen(`${conn}<b>${it.pos}</b> · ${it.card.name}${it.rev?' <span class="ori r">역</span>':' <span class="ori u">정</span>'}<br>${core}`,700);
      prev=it.rev;
    }
    // 종합
    const summ=buildSummary();
    await botThen(summ,950,{wide:true});
    await botThen(`${pick(BANK.outro)}`,700);
  }
  // 액션(다시보기/공유/저장)
  showActions();
  state.step="done";
}

function buildSummary(){
  const d=state.drawn;const t=state.theme;
  const revN=d.filter(x=>x.rev).length;const majN=d.filter(x=>x.card.arcana==='major').length;
  let s=`<b>🔮 종합</b><br>`;
  if(state.spread==="three"){
    s+=`과거의 <b>${d[0].card.name}</b>에서 시작된 흐름이 현재의 <b>${d[1].card.name}</b>를 지나 미래의 <b>${d[2].card.name}</b>로 이어져. `;
    s+=`지금에 집중하되, 미래 카드가 가리키는 방향을 마음에 담아두면 흐름을 더 편안히 탈 수 있어. `;
  }else{
    s+=`지금 상황(<b>${d[0].card.name}</b>)과 눈앞의 과제(<b>${d[1].card.name}</b>)가 핵심 축이고, 결과는 <b>${d[9].card.name}</b>를 향해 가. `;
    s+=`나의 태도(${d[6].card.name})와 마음속 희망·두려움(${d[8].card.name})을 잘 다루는 게 결과를 바꾸는 열쇠야. `;
  }
  if(majN>=Math.ceil(d.length/2)&&d.length>1) s+=`메이저 카드가 많이 나온 걸 보면, 지금은 큰 흐름이 움직이는 중요한 시기야. `;
  if(revN===0) s+=`카드가 모두 정방향이라 에너지가 순하게 흘러.`;
  else if(revN>=d.length/2) s+=`역방향이 조금 많아, 잠시 속도를 늦추고 마음을 정비하면 좋겠어.`;
  else s+=`정·역이 섞여 있으니, 흐름은 타되 걸림돌은 미리 살피면 돼.`;
  return s;
}

function loadImg(src){return new Promise(res=>{const im=new Image();im.onload=()=>res(im);im.onerror=()=>res(null);im.src=src;});}

function openShare(){
  const d=state.drawn;
  // 모든 카드 이미지 선로드 후 렌더
  Promise.all(d.map(it=>loadImg(encodeURI(it.card.file)))).then(imgs=>renderShare(imgs));

// 카드 한 장 그리기 (골드 프레임 + 클립 + 역방향 회전, 이미지 없으면 백면)
function drawCard(x,img,rx,ry,w,h,rev){
  x.save();
  roundRect(x,rx-5,ry-5,w+10,h+10,16);x.fillStyle='#ffd98a';x.fill();
  roundRect(x,rx,ry,w,h,12);x.save();x.clip();
  if(img){
    if(rev){x.translate(rx+w/2,ry+h/2);x.rotate(Math.PI);x.drawImage(img,-w/2,-h/2,w,h);}
    else{x.drawImage(img,rx,ry,w,h);}
  }else{
    x.fillStyle='#271d47';x.fillRect(rx,ry,w,h);
    x.fillStyle='#ffd98a';x.textAlign='center';x.font=`${Math.round(w*.4)}px serif`;
    x.fillText('✦',rx+w/2,ry+h/2+w*.14);
  }
  x.restore();x.restore();
}

function renderShare(imgs){
  const cv=document.getElementById('shareCanvas');const x=cv.getContext('2d');
  const W=cv.width,H=cv.height;const d=state.drawn;const t=state.theme;
  // 배경
  const g=x.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'#2a1f52');g.addColorStop(.55,'#1a1330');g.addColorStop(1,'#0d0a1c');
  x.fillStyle=g;x.fillRect(0,0,W,H);
  x.fillStyle='rgba(255,255,255,.85)';
  for(let i=0;i<70;i++){const r=Math.random()*2.4+.6;x.globalAlpha=Math.random()*.7+.2;
    x.beginPath();x.arc(Math.random()*W,Math.random()*H*.9,r,0,7);x.fill();}
  x.globalAlpha=1;
  // 헤더
  x.textAlign='center';
  x.fillStyle='#ffd98a';x.font='700 48px Pretendard, sans-serif';
  x.fillText('🌙  ktaro',W/2,140);
  x.fillStyle='#b7a9d6';x.font='400 32px Pretendard, sans-serif';
  const dd=new Date();
  x.fillText(`${dd.getFullYear()}.${String(dd.getMonth()+1).padStart(2,'0')}.${String(dd.getDate()).padStart(2,'0')} · ${THEMES[t].icon} ${THEMES[t].label}`,W/2,192);
  if(state.nickname){x.fillStyle='#b7a9d6';x.font='600 30px Pretendard, sans-serif';
    x.textAlign='right';x.fillText('for '+state.nickname,W-60,140);x.textAlign='center';}

  // 스프레드 제목
  x.fillStyle='#fff';x.font='800 40px Pretendard, sans-serif';
  x.fillText(SPREADS[state.spread].label,W/2,270);

  let msgY;
  if(d.length===1){
    const cw=480,ch=cw*1.72,cx=(W-cw)/2,cy=330;
    drawCard(x,imgs[0],cx,cy,cw,ch,d[0].rev);
    let y=cy+ch+80;
    x.fillStyle='#fff';x.font='800 54px Pretendard, sans-serif';
    x.fillText(`${d[0].card.name}${d[0].rev?' (역)':''}`,W/2,y);
    msgY=y+70;
  } else if(d.length===3){
    const cw=290,ch=cw*1.72,gap=30,total=cw*3+gap*2,sx=(W-total)/2,cy=400;
    d.forEach((it,i)=>{
      const rx=sx+i*(cw+gap);
      // 위치 라벨
      x.fillStyle='#ffd98a';x.font='700 30px Pretendard, sans-serif';x.textAlign='center';
      x.fillText(it.pos,rx+cw/2,cy-24);
      drawCard(x,imgs[i],rx,cy,cw,ch,it.rev);
      // 카드명
      x.fillStyle='#fff';x.font='700 27px Pretendard, sans-serif';
      wrapText(x,`${it.card.name}${it.rev?'(역)':''}`,rx+cw/2,cy+ch+42,cw+20,32);
    });
    msgY=cy+ch+150;
  } else { // 10장 켈틱: 5열 2행
    const cw=176,ch=cw*1.72,gap=18,cols=5,total=cw*cols+gap*(cols-1),sx=(W-total)/2,cy=400,rgap=70;
    d.forEach((it,i)=>{
      const col=i%5,row=Math.floor(i/5);
      const rx=sx+col*(cw+gap),ry=cy+row*(ch+rgap);
      x.fillStyle='#b7a9d6';x.font='700 24px Pretendard, sans-serif';x.textAlign='center';
      x.fillText((i+1)+'',rx+cw/2,ry-14);
      drawCard(x,imgs[i],rx,ry,cw,ch,it.rev);
      x.fillStyle='#e8dfff';x.font='600 19px Pretendard, sans-serif';
      wrapText(x,`${it.card.name}${it.rev?'(역)':''}`,rx+cw/2,ry+ch+30,cw+16,22);
    });
    msgY=cy+2*ch+rgap+150;
  }

  // 한 줄 요약 메시지
  x.textAlign='center';
  x.fillStyle='#e8dfff';x.font='400 36px Pretendard, sans-serif';
  wrapText(x,shareMessage(),W/2,msgY,W-160,50);

  // 하단
  x.fillStyle='#8f81b8';x.font='400 26px Pretendard, sans-serif';
  x.fillText('다정한 AI 타로 친구 · ktaro 🐈‍⬛',W/2,H-64);
  document.getElementById('overlay').classList.add('show');
}

// 스프레드별 한 줄 공유 메시지 (평문)
function shareMessage(){
  const d=state.drawn,t=state.theme;
  if(state.spread==='one') return coreOf(d[0].card,d[0].rev,t);
  if(state.spread==='three')
    return `${d[0].card.name} → ${d[1].card.name} → ${d[2].card.name}\n미래의 ${d[2].card.name}가 가리키는 방향을 마음에 담아봐요.`;
  return `핵심은 ${d[0].card.name}, 최종 결과는 ${d[9].card.name}.\n지금의 태도가 흐름을 바꿔가요.`;
}
function roundRect(x,rx,ry,w,h,r){x.beginPath();x.moveTo(rx+r,ry);x.arcTo(rx+w,ry,rx+w,ry+h,r);
  x.arcTo(rx+w,ry+h,rx,ry+h,r);x.arcTo(rx,ry+h,rx,ry,r);x.arcTo(rx,ry,rx+w,ry,r);x.closePath();}
function wrapText(ctx,text,cx,cy,maxW,lh){
  const lines=[];
  String(text).split('\n').forEach(seg=>{
    let line='';
    for(const ch of seg){ if(ctx.measureText(line+ch).width>maxW){lines.push(line);line=ch;} else line+=ch; }
    lines.push(line);
  });
  lines.forEach((ln,i)=>ctx.fillText(ln,cx,cy+i*lh));
}
document.getElementById('closeOv').onclick=()=>document.getElementById('overlay').classList.remove('show');
document.getElementById('dlBtn').onclick=()=>{
  const cv=document.getElementById('shareCanvas');
  const label=SPREADS[state.spread].label.replace(/[ ·]/g,'');
  const a=document.createElement('a');a.download=`ktaro_${label}.png`;
  a.href=cv.toDataURL('image/png');a.click();
};

/* ---------- 입력 처리 ---------- */
function handleInput(text){
  text=text.trim();if(!text)return;
  meMsg(escapeHtml(text));
  if(state.step==="nickname"){
    const nn=(/패스|pass|넘어|스킵|skip/i.test(text))?null:text.slice(0,12);
    state.nickname=nn;state.step="theme";
    setTimeout(async()=>{
      await botThen(nn?`반가워, <b>${escapeHtml(nn)}</b>! 🐈‍⬛`:`좋아, 편하게 부를게. 🐈‍⬛`,600);
      askTheme();
    },200);
  }else if(state.step==="question"){
    state.question=text;state.step="drawing";
    state.drawn=drawSpread();
    setTimeout(presentCards,200);
  }else if(state.step==="done"){
    // 새 질문으로 간주 → 주제 다시
    setTimeout(async()=>{await botThen(`또 궁금한 게 생겼구나. 주제부터 다시 골라볼까?`,600);resetToTheme();},150);
  }else{
    // 아직 칩 선택 대기 등
  }
}
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

sendBtn.onclick=()=>{const v=input.value;input.value='';input.style.height='auto';handleInput(v);};
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendBtn.click();}});
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,110)+'px';});

/* ---------- 홈(메인) 화면 네비게이션 ---------- */
let greeted=false;
function showChatUI(){
  document.getElementById('home').classList.add('hidden');
  chat.classList.remove('hidden');
  document.getElementById('inputbar').classList.remove('hidden');
  document.getElementById('disc').classList.remove('hidden');
  document.getElementById('homeBtn').style.display='flex';
}
function goHome(){
  document.getElementById('home').classList.remove('hidden');
  chat.classList.add('hidden');
  document.getElementById('inputbar').classList.add('hidden');
  document.getElementById('disc').classList.add('hidden');
  document.getElementById('homeBtn').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}
async function briefGreet(){
  if(greeted)return; greeted=true;
  await botThen(`안녕, 나는 밤에 찾아오는 타로 친구 <b>묘묘</b>야. 🐈‍⬛`,500);
}

// 리딩 시작하기 (풀 온보딩)
document.getElementById('startBtn').onclick=()=>{
  showChatUI();
  if(!greeted){ greeted=true; start(); }
  else { setTimeout(async()=>{ await botThen(`또 봐서 반가워! 어떤 이야기가 궁금해?`,500); resetToTheme(); },150); }
};
// 오늘의 카드 바로 뽑기
document.getElementById('dailyBtn').onclick=async()=>{
  showChatUI(); await briefGreet();
  state.theme='general'; state.spread='one'; state.question=null;
  await botThen(`오늘 하루, 마음에 담아둘 한 마디를 뽑아줄게. 🌅`,650);
  state.drawn=drawSpread(); setTimeout(presentCards,150);
};
// 스프레드 바로가기 (3장 / 켈틱)
document.querySelectorAll('.home .menu .mchip').forEach(b=>{
  b.onclick=async()=>{
    showChatUI(); await briefGreet();
    state.spread=b.dataset.sp;
    askTheme();
  };
});
document.getElementById('homeBtn').onclick=goHome;

/* start(): 닉네임부터 시작하는 전체 온보딩 (홈 버튼으로 진입) */
</script>
