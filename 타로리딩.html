<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>타로 리딩</title>
<style>
  :root{
    --bg:#0f0c1d; --bg2:#1a1433; --gold:#e8c583; --gold2:#c9a24b;
    --ink:#f3ecff; --muted:#b7a9d6; --card:#221a3d; --line:#3a2f5e;
    --up:#8fe0a4; --rev:#f0a8b8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:radial-gradient(1200px 800px at 50% -10%,#241a45 0%,var(--bg) 55%,#080611 100%);
    color:var(--ink);min-height:100vh;padding:28px 16px 80px;
  }
  .wrap{max-width:1080px;margin:0 auto}
  header{text-align:center;margin-bottom:22px}
  h1{font-size:30px;letter-spacing:.14em;font-weight:700;
    background:linear-gradient(180deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--muted);font-size:13.5px;margin-top:6px;letter-spacing:.02em}

  .panel{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.01));
    border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:18px;
    box-shadow:0 10px 40px rgba(0,0,0,.35)}

  .row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center}
  .label{color:var(--muted);font-size:12.5px;width:100%;text-align:center;margin-bottom:8px;letter-spacing:.08em}

  .seg{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px}
  .seg button{background:transparent;color:var(--muted);border:0;padding:9px 16px;border-radius:9px;
    font-size:13.5px;cursor:pointer;transition:.2s;font-family:inherit;white-space:nowrap}
  .seg button.on{background:linear-gradient(180deg,var(--gold),var(--gold2));color:#2a1e05;font-weight:700}
  .seg button:hover:not(.on){color:var(--ink)}

  .qbox{width:100%;max-width:560px;margin:14px auto 0;display:flex;gap:8px}
  .qbox input{flex:1;background:var(--card);border:1px solid var(--line);border-radius:11px;
    color:var(--ink);padding:12px 14px;font-size:14px;font-family:inherit;outline:none}
  .qbox input:focus{border-color:var(--gold2)}
  .draw{background:linear-gradient(180deg,var(--gold),var(--gold2));color:#2a1e05;border:0;border-radius:11px;
    padding:0 22px;font-size:14.5px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.03em;transition:.15s}
  .draw:hover{filter:brightness(1.07);transform:translateY(-1px)}
  .draw:active{transform:translateY(0)}
  .toolrow{margin-top:12px;justify-content:center;gap:16px}
  .chk{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-size:12.5px;cursor:pointer;user-select:none}
  .chk input{accent-color:var(--gold2);width:15px;height:15px}

  /* board */
  .board{margin-top:8px;min-height:120px}
  .grid{display:grid;gap:16px;justify-content:center}
  .g1{grid-template-columns:repeat(1,1fr);max-width:260px;margin:0 auto}
  .g3{grid-template-columns:repeat(3,1fr);max-width:720px;margin:0 auto}

  .slot{display:flex;flex-direction:column;align-items:center;gap:8px}
  .pos{color:var(--gold);font-size:12px;letter-spacing:.06em;min-height:16px;text-align:center;font-weight:600}
  .cardframe{width:100%;aspect-ratio:1/1.72;max-width:230px;perspective:1000px;cursor:pointer}
  .flipper{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .7s cubic-bezier(.2,.7,.2,1)}
  .cardframe.flipped .flipper{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;overflow:hidden;
    border:1px solid var(--line);box-shadow:0 8px 22px rgba(0,0,0,.45)}
  .back{background:
      repeating-linear-gradient(45deg,#2c2350 0 8px,#251e45 8px 16px);
    display:flex;align-items:center;justify-content:center}
  .back::after{content:"✦";font-size:40px;color:var(--gold);opacity:.85;
    text-shadow:0 0 18px rgba(232,197,131,.5)}
  .back{border:1px solid var(--gold2)}
  .front{transform:rotateY(180deg);background:#000}
  .front img{width:100%;height:100%;object-fit:cover;display:block}
  .front img.rev{transform:rotate(180deg)}
  .revtag{position:absolute;top:6px;right:6px;background:rgba(240,168,184,.92);color:#3a0d18;
    font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:20px;z-index:2}

  .cardname{font-size:12.5px;font-weight:700;text-align:center;min-height:16px}
  .cardname .r{color:var(--rev)}
  .cardname .u{color:var(--up)}

  /* celtic layout */
  .celtic{position:relative;width:100%;max-width:720px;margin:0 auto;
    display:grid;grid-template-columns:1fr 1fr 1fr 1fr;grid-template-rows:auto auto auto;gap:10px 14px}
  .celtic .cardframe{max-width:150px}
  .celtic .cardname{font-size:11px}
  .celtic .pos{font-size:10.5px;min-height:26px;line-height:1.3}
  .cel-cross{grid-column:2/3;grid-row:1/4;display:flex;align-items:center;justify-content:center;position:relative}
  .cross-inner{position:relative;width:100%}
  .cross-inner .c1{position:relative;z-index:1}
  .cross-inner .c2{position:absolute;top:50%;left:50%;width:70%;transform:translate(-50%,-50%) rotate(90deg);z-index:2}

  .reading{margin-top:22px}
  .r-head{font-size:15px;color:var(--gold);letter-spacing:.06em;margin-bottom:12px;text-align:center;font-weight:700}
  .r-item{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--gold2);
    border-radius:12px;padding:14px 16px;margin-bottom:11px}
  .r-item .rp{font-size:11.5px;color:var(--muted);letter-spacing:.06em;margin-bottom:3px}
  .r-item h4{font-size:15.5px;margin-bottom:6px}
  .r-item h4 .ori{font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:middle}
  .ori.u{background:rgba(143,224,164,.16);color:var(--up)}
  .ori.r{background:rgba(240,168,184,.16);color:var(--rev)}
  .kw{color:var(--muted);font-size:12.5px;margin-bottom:8px}
  .kw b{color:var(--gold)}
  .mean{font-size:14px;line-height:1.72;color:var(--ink)}
  .summary{background:linear-gradient(180deg,rgba(232,197,131,.09),rgba(232,197,131,.02));
    border:1px solid var(--gold2);border-radius:14px;padding:16px 18px;margin-top:6px;line-height:1.75;font-size:14px}
  .summary b{color:var(--gold)}
  .empty{text-align:center;color:var(--muted);font-size:13.5px;padding:30px 10px}
  .hint{font-size:11.5px;color:var(--muted);text-align:center;margin-top:6px}
  @media(max-width:640px){
    .g3{grid-template-columns:1fr;max-width:260px}
    .celtic{grid-template-columns:1fr 1fr;max-width:360px}
    .cel-cross{grid-column:1/3;grid-row:auto}
    h1{font-size:24px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>✦ 타로 리딩 ✦</h1>
    <div class="sub">라이더-웨이트 78장 · 질문을 마음에 담고 카드를 뽑으세요</div>
  </header>

  <div class="panel">
    <div class="label">스프레드 선택</div>
    <div class="row">
      <div class="seg" id="spreads">
        <button data-s="one" class="on">오늘의 카드 (1장)</button>
        <button data-s="three">과거·현재·미래 (3장)</button>
        <button data-s="celtic">켈틱 크로스 (10장)</button>
      </div>
    </div>
    <div class="qbox">
      <input id="q" type="text" placeholder="질문을 입력하세요 (예: 이번 달 연애운은?)">
      <button class="draw" id="drawBtn">카드 뽑기</button>
    </div>
    <div class="row toolrow">
      <label class="chk"><input type="checkbox" id="revToggle" checked> 역방향 포함</label>
      <label class="chk"><input type="checkbox" id="autoFlip"> 자동으로 펼치기</label>
    </div>
    <div class="hint">카드를 클릭하면 뒤집힙니다.</div>
  </div>

  <div class="panel">
    <div class="board" id="board">
      <div class="empty">스프레드를 고르고 <b>카드 뽑기</b>를 눌러 시작하세요 🔮</div>
    </div>
  </div>

  <div class="reading" id="reading"></div>
</div>

<script>
/* ---------- 카드 데이터 (78장) ---------- */
const F = (n)=>encodeURI(n); // 파일명 → 안전한 경로

const major = [
 {n:"바보",en:"The Fool",f:"0. 바보 카드.jpg",kw:"새로운 시작, 순수, 모험, 자유",
  u:"두려움 없이 새로운 여정을 시작할 때입니다. 계산보다 직관과 순수한 열정을 믿어도 좋습니다. 아직 정해지지 않은 무한한 가능성이 열려 있어요.",
  r:"무모함이나 준비 부족을 조심하세요. 즉흥적인 결정이 위험을 부를 수 있으니, 한 발 물러나 현실을 점검할 필요가 있습니다."},
 {n:"마법사",en:"The Magician",f:"1. 마법사 카드.jpg",kw:"의지, 창조, 실행력, 재능",
  u:"원하는 것을 현실로 만들 자원과 재능이 이미 당신 안에 있습니다. 집중된 의지로 지금 행동하면 결실을 맺습니다.",
  r:"재능을 낭비하거나 잔재주에 그칠 수 있습니다. 자기기만이나 목적 없는 조작을 경계하세요."},
 {n:"여사제",en:"The High Priestess",f:"2. 여사제 카드.jpg",kw:"직관, 내면, 비밀, 지혜",
  u:"답은 밖이 아니라 당신의 직관 속에 있습니다. 서두르지 말고 고요히 내면의 목소리에 귀 기울이세요.",
  r:"직관을 무시하거나 감정을 억누르고 있습니다. 감춰진 정보나 비밀이 문제를 일으킬 수 있어요."},
 {n:"여황제",en:"The Empress",f:"3. 여황제 카드.jpg",kw:"풍요, 모성, 창조, 사랑",
  u:"풍요와 사랑이 흘러넘치는 시기입니다. 창의력과 돌봄이 결실을 맺고, 관계와 물질 모두 성장합니다.",
  r:"과잉보호나 의존, 창조적 정체가 나타날 수 있습니다. 자기 자신을 먼저 돌볼 필요가 있어요."},
 {n:"황제",en:"The Emperor",f:"4. 황제 카드.jpg",kw:"권위, 안정, 구조, 리더십",
  u:"질서와 규율로 기반을 다질 때입니다. 책임감 있는 리더십과 명확한 계획이 성공을 가져옵니다.",
  r:"경직됨이나 지나친 통제, 고집이 문제입니다. 권위에 대한 갈등이나 우유부단함을 뜻하기도 합니다."},
 {n:"교황",en:"The Hierophant",f:"5. 교황 카드.jpg",kw:"전통, 가르침, 신념, 제도",
  u:"전통과 검증된 방식, 멘토의 조언에서 답을 찾을 때입니다. 배움과 신념 체계가 든든한 지지가 됩니다.",
  r:"틀에 박힌 관습에 대한 저항, 자기만의 길을 찾으려는 마음입니다. 형식주의를 깨야 할 때일 수 있어요."},
 {n:"연인",en:"The Lovers",f:"6. 연인 카드.jpg",kw:"사랑, 선택, 조화, 결합",
  u:"깊은 유대와 진실한 선택의 순간입니다. 가치관이 맞는 관계, 마음이 하나 되는 조화를 뜻합니다.",
  r:"관계의 불화나 가치관 충돌, 잘못된 선택을 경계하세요. 균형이 깨져 있을 수 있습니다."},
 {n:"전차",en:"The Chariot",f:"7. 전차 카드.jpg",kw:"의지, 승리, 추진력, 통제",
  u:"강한 의지와 집중으로 장애를 돌파하고 승리합니다. 상반된 힘을 통제하며 목표를 향해 전진하세요.",
  r:"방향 상실이나 통제력 저하입니다. 조급함이나 감정에 휘둘려 길을 잃지 않도록 주의하세요."},
 {n:"힘",en:"Strength",f:"8. 힘 카드.jpg",kw:"용기, 인내, 부드러운 힘, 자제",
  u:"완력이 아닌 부드러움과 인내로 상황을 다스립니다. 내면의 용기와 자기 통제가 진정한 힘이 됩니다.",
  r:"자신감 부족이나 감정 폭발, 두려움에 굴복함입니다. 스스로에 대한 신뢰를 회복하세요."},
 {n:"은둔자",en:"The Hermit",f:"9. 은둔자 카드.jpg",kw:"성찰, 고독, 탐구, 내면의 빛",
  u:"홀로 물러나 내면을 성찰할 시간입니다. 고요 속에서 진리를 찾고, 스스로 등불이 되어 길을 밝힙니다.",
  r:"고립이나 외로움, 지나친 은둔입니다. 필요한 도움을 거부하고 있진 않은지 살펴보세요."},
 {n:"운명의 수레바퀴",en:"Wheel of Fortune",f:"10. 운명의 수레바퀴.jpg",kw:"변화, 순환, 운명, 전환점",
  u:"운명의 흐름이 당신에게 유리하게 돌아섭니다. 변화를 받아들이면 새로운 기회의 사이클이 시작됩니다.",
  r:"예기치 못한 하락이나 불운, 통제 밖의 변화입니다. 흐름에 저항하기보다 유연하게 대응하세요."},
 {n:"정의",en:"Justice",f:"11. 정의 카드.jpg",kw:"공정, 진실, 책임, 인과",
  u:"공정한 결과와 진실이 드러납니다. 균형 잡힌 판단과 책임 있는 행동이 정당한 보상을 가져옵니다.",
  r:"불공정, 편견, 책임 회피입니다. 스스로에게 정직한지, 결과를 외면하고 있진 않은지 돌아보세요."},
 {n:"행맨(매달린 사람)",en:"The Hanged Man",f:"12. 행맨 카드.jpg",kw:"멈춤, 관점 전환, 희생, 인내",
  u:"잠시 멈추고 상황을 다른 각도에서 바라볼 때입니다. 놓아버림과 기다림 속에서 새로운 깨달음이 옵니다.",
  r:"불필요한 정체나 순교자적 태도, 미루기입니다. 소모적인 희생은 이제 내려놓으세요."},
 {n:"죽음",en:"Death",f:"13. 죽음 카드.jpg",kw:"끝과 시작, 변형, 전환, 해방",
  u:"한 장이 끝나고 완전히 새로운 국면이 시작됩니다. 낡은 것을 떠나보내면 재생과 변화가 찾아옵니다.",
  r:"변화에 대한 저항, 끝맺지 못한 집착입니다. 놓아야 할 것을 붙들고 있어 정체되어 있어요."},
 {n:"절제",en:"Temperance",f:"14. 절제 카드.jpg",kw:"균형, 조화, 중용, 치유",

 {n:"악마",en:"The Devil",f:"15. 악마 카드.jpg",kw:"속박, 집착, 유혹, 그림자",

 {n:"타워",en:"The Tower",f:"16. 타워 카드.jpg",kw:"급변, 붕괴, 각성, 해방",
  u:"낡은 구조가 갑자기 무너집니다. 충격적이지만 거짓된 기반을 허물고 진실 위에 다시 세우는 계기가 됩니다.",

 {n:"별",en:"The Star",f:"17. 별 카드.jpg",kw:"희망, 치유, 영감, 믿음",
  u:"어둠 뒤에 찾아온 희망과 치유의 빛입니다. 평온함 속에서 미래에 대한 믿음과 영감이 회복됩니다.",
  r:"희망 상실, 자신감 저하, 낙담입니다. 잠시 빛이 가려졌을 뿐, 다시 믿음을 회복할 수 있습니다."},
 {n:"달",en:"The Moon",f:"18. 달 카드.jpg",kw:"불안, 환상, 무의식, 직관",
  u:"명확하지 않은 상황, 무의식과 직관이 강해지는 시기입니다. 두려움과 환상을 구분하며 천천히 나아가세요.",
  r:"혼란이 걷히고 진실이 드러나기 시작합니다. 억눌린 감정이 표면화되며 오해가 풀립니다."},
 {n:"태양",en:"The Sun",f:"19. 태양 카드.jpg",kw:"기쁨, 성공, 활력, 명료함",

Object.keys(suitInfo).forEach(suit=>{
  const info = suitInfo[suit];
  // 숫자 카드
  for(let i=1;i<=10;i++){
    const label = i===1 ? `${suit} 에이스` : `${suit}${i}`;

/* ---------- 스프레드 정의 ---------- */
const spreads = {
  one:{count:1,label:"오늘의 카드",pos:["오늘의 메시지"]},
  three:{count:3,label:"과거 · 현재 · 미래",pos:["과거","현재","미래"]},
  celtic:{count:10,label:"켈틱 크로스",pos:[
    "1. 현재 상황","2. 도전 / 장애","3. 무의식 · 뿌리","4. 과거","5. 목표 · 의식",
    "6. 가까운 미래","7. 나의 태도","8. 주변 · 환경","9. 희망과 두려움","10. 최종 결과"]}
};

let current = "one";

/* ---------- 셔플 & 뽑기 ---------- */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function drawCards(){
  const sp = spreads[current];
  const allowRev = document.getElementById('revToggle').checked;
  const pool = shuffle([...deck]).slice(0,sp.count);
  return pool.map((c,i)=>({
    card:c,
    reversed: allowRev ? Math.random()<0.42 : false,
    pos: sp.pos[i]
  }));
}

let drawn = [];

/* ---------- 렌더 ---------- */
const board = document.getElementById('board');
const readingEl = document.getElementById('reading');

function cardHTML(item,idx){
  const c = item.card;
  const revClass = item.reversed ? 'rev':'';
  const revTag = item.reversed ? '<span class="revtag">역방향</span>':'';
  return `
   <div class="slot">
     <div class="pos">${item.pos}</div>
     <div class="cardframe" data-idx="${idx}" onclick="flip(this)">
       <div class="flipper">
         <div class="face back"></div>
         <div class="face front">
           ${revTag}
           <img src="${F(c.file)}" alt="${c.name}" class="${revClass}" onerror="imgFail(this)">
         </div>
       </div>
     </div>
     <div class="cardname" data-name="${idx}"></div>
   </div>`;
}

function imgFail(img){
  img.style.display='none';
  const front=img.closest('.front');
  front.style.display='flex';front.style.alignItems='center';front.style.justifyContent='center';
  front.style.color='var(--muted)';front.style.fontSize='12px';front.style.padding='10px';front.style.textAlign='center';
  front.insertAdjacentHTML('beforeend','<div>이미지를 불러올 수 없습니다<br>('+img.getAttribute('alt')+')</div>');
}

function render(){
  const sp = spreads[current];
  let html;
  if(current==='celtic'){
    html = renderCeltic();
  } else {
    const cls = sp.count===1?'g1':'g3';
    html = `<div class="grid ${cls}">${drawn.map((it,i)=>cardHTML(it,i)).join('')}</div>`;
  }
  board.innerHTML = html;
  readingEl.innerHTML = '';
  if(document.getElementById('autoFlip').checked){
    setTimeout(()=>{document.querySelectorAll('.cardframe').forEach((el,i)=>{setTimeout(()=>flip(el,true),i*180);});},250);
  }
}

function renderCeltic(){
  // 10장을 켈틱 배열로
  const c = drawn;
  const slot=(i)=>cardHTML(c[i],i);
  return `<div class="celtic">
    <div style="grid-column:1;grid-row:2">${slot(3)}</div>
    <div class="cel-cross">
      <div class="cross-inner">
        <div class="c1">${slot(0)}</div>
        <div class="c2">${slot(1)}</div>
      </div>
    </div>
    <div style="grid-column:2;grid-row:1;align-self:start">${slot(4)}</div>
    <div style="grid-column:2;grid-row:3;align-self:end">${slot(2)}</div>
    <div style="grid-column:3;grid-row:2">${slot(5)}</div>
    <div style="grid-column:4;grid-row:1">${slot(9)}</div>
    <div style="grid-column:4;grid-row:1;align-self:end;margin-top:170px">${slot(8)}</div>
    <div style="grid-column:4;grid-row:3;align-self:start">${slot(7)}</div>
    <div style="grid-column:4;grid-row:3;align-self:end">${slot(6)}</div>
  </div>`;
}

let flippedCount = 0;
function flip(el,auto){
  if(el.classList.contains('flipped')) return;
  el.classList.add('flipped');
  const idx = +el.dataset.idx;
  const it = drawn[idx];
  const c = it.card;
  const nameEl = document.querySelector(`.cardname[data-name="${idx}"]`);
  if(nameEl){
    const cls = it.reversed?'r':'u';
    const ori = it.reversed?'(역)':'';
    nameEl.innerHTML = `<span class="${cls}">${c.name} ${ori}</span>`;
  }
  flippedCount++;
  if(flippedCount>=drawn.length) showReading();
}

function showReading(){
  const sp = spreads[current];
  let items = drawn.map(it=>{
    const c = it.card;
    const oriTxt = it.reversed?'역방향':'정방향';
    const oriCls = it.reversed?'r':'u';
    const meaning = it.reversed?c.rev:c.up;
    return `<div class="r-item">
      <div class="rp">${it.pos}</div>
      <h4>${c.name} <span style="color:var(--muted);font-weight:500;font-size:12px">${c.en}</span>
        <span class="ori ${oriCls}">${oriTxt}</span></h4>
      <div class="kw"><b>키워드</b> · ${c.kw}</div>
      <div class="mean">${meaning}</div>
    </div>`;
  }).join('');

  const q = document.getElementById('q').value.trim();
  const summary = buildSummary(q);

  readingEl.innerHTML = `
    <div class="panel">
      <div class="r-head">🔮 ${sp.label} 해석</div>
      ${items}
      <div class="summary">${summary}</div>
    </div>`;
  readingEl.scrollIntoView({behavior:'smooth',block:'start'});
}

function buildSummary(q){
  const revCount = drawn.filter(d=>d.reversed).length;
  const majorCount = drawn.filter(d=>d.card.arcana==='major').length;
  let s = q ? `<b>“${q}”</b> 에 대한 카드의 흐름을 정리하면 — ` : `카드가 전하는 전체 흐름을 정리하면 — `;

  if(current==='one'){
    const it = drawn[0];
    s += `오늘의 핵심은 <b>${it.card.name}</b>(${it.reversed?'역방향':'정방향'})입니다. ${it.reversed?it.card.rev:it.card.up} 이 메시지를 하루의 나침반으로 삼아보세요.`;
  } else if(current==='three'){
    s += `과거의 <b>${drawn[0].card.name}</b>에서 시작된 흐름이 현재의 <b>${drawn[1].card.name}</b>를 지나 미래의 <b>${drawn[2].card.name}</b>로 이어집니다. `;
    s += `현재에 집중하되, 미래 카드가 가리키는 방향을 염두에 두면 흐름을 유리하게 이끌 수 있습니다. `;
  } else {
    s += `현재 상황(<b>${drawn[0].card.name}</b>)과 눈앞의 도전(<b>${drawn[1].card.name}</b>)이 핵심 축을 이루며, 최종 결과는 <b>${drawn[9].card.name}</b>로 향합니다. `;
    s += `나의 태도(${drawn[6].card.name})와 희망·두려움(${drawn[8].card.name})을 잘 다루는 것이 결과를 바꾸는 열쇠입니다. `;
  }

  if(majorCount>=Math.ceil(drawn.length/2) && drawn.length>1){
    s += `메이저 아르카나가 많이 나온 것으로 보아, 지금은 운명적이고 큰 흐름이 작용하는 중요한 시기입니다. `;
  }
  if(drawn.length>1){
    if(revCount===0) s += `모든 카드가 정방향이라 에너지가 순조롭게 흐르고 있습니다.`;
    else if(revCount>=drawn.length/2) s += `역방향 카드가 많아 내면의 정비와 속도 조절이 필요한 때입니다.`;
    else s += `정·역이 섞여 있어, 흐름을 타되 걸림돌은 미리 살피는 균형이 필요합니다.`;
  }
  s += `<br><br><span style="color:var(--muted);font-size:12.5px">✦ 타로는 결정을 대신하지 않고, 스스로 돌아보게 돕는 거울입니다. 최종 선택은 언제나 당신의 몫이에요.</span>`;
  return s;
}

/* ---------- 이벤트 ---------- */
document.getElementById('spreads').addEventListener('click',e=>{
  const b = e.target.closest('button'); if(!b) return;
  document.querySelectorAll('#spreads button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  current = b.dataset.s;
  drawn=[];flippedCount=0;
  board.innerHTML = '<div class="empty">준비 완료! <b>카드 뽑기</b>를 눌러 '+spreads[current].label+'을(를) 시작하세요 🔮</div>';
  readingEl.innerHTML='';
});

document.getElementById('drawBtn').addEventListener('click',()=>{
  drawn = drawCards();
  flippedCount = 0;
  render();
});

document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('drawBtn').click();});
</script>
</body>
