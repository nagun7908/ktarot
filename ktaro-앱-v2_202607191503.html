<!DOCTYPE html><html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ATLAS · The Astro-Compass</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Nanum+Myeongjo:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#120d24;--card:#241a3d;--ink:#efeaff;--soft:#c9bdf0;--mute:#8b7fb5;--acc:#a78bff;--gold:#ffd98a;--line:#352a58;--cat:#2a2150;--me:#5a3fc0}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{max-width:460px;margin:0 auto;background:radial-gradient(900px 600px at 50% -8%,#2a1f52,#120d24 60%);color:var(--ink);font-family:"Pretendard",system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100vh}
.top{padding:13px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);background:rgba(18,13,36,.85);backdrop-filter:blur(8px);flex-shrink:0}
.top .av{width:36px;height:36px;border-radius:50%;background:linear-gradient(150deg,#3d2a8c,#6d4aff);display:flex;align-items:center;justify-content:center;font-size:19px}
.top .nm{font-weight:800;font-size:15.5px}.top .st{font-size:11px;color:var(--mute)}
.top .home{margin-left:auto;font-size:12.5px;color:var(--soft);background:none;border:1px solid var(--line);border-radius:100px;padding:6px 12px;cursor:pointer;display:none}
/* MAIN */
#main{flex:1;overflow-y:auto;padding:26px 20px 30px}
.hero{text-align:center;margin-bottom:8px}
.hero .logo{font-size:30px;font-weight:800;background:linear-gradient(90deg,#c9b6ff,#ffd98a);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .tag{font-size:13px;color:var(--mute);margin-top:5px}
.opt{background:linear-gradient(150deg,#2a1f52,#241a3d);border:1px solid #4a3a8a;border-radius:20px;padding:22px 20px;margin-top:16px;cursor:pointer;display:flex;align-items:center;gap:16px;transition:.15s;box-shadow:0 6px 24px rgba(60,40,140,.18)}
.opt:active{transform:scale(.98)}
.opt .ic{font-size:34px;flex-shrink:0}
.opt .ti{font-family:"Nanum Myeongjo",serif;font-size:19px;font-weight:800}.opt .de{font-size:13px;color:var(--soft);margin-top:3px;line-height:1.5}
.opt .go{margin-left:auto;color:var(--acc);font-size:20px}
.mdisc{font-size:11px;color:var(--mute);text-align:center;margin-top:26px;line-height:1.55}
.footer{margin-top:22px;padding:18px 12px 6px;border-top:1px solid var(--line);text-align:center}
.footer .fl{font-family:"Cinzel",Georgia,serif;letter-spacing:.2em;color:#e9e2cf;font-size:13px}
.footer .fc{font-size:10.5px;color:var(--mute);margin-top:7px;line-height:1.7;letter-spacing:.02em}
.footer .fc a{color:var(--soft);text-decoration:none}
/* CHAT */
#chat{flex:1;overflow-y:auto;padding:18px 14px 20px;display:none;flex-direction:column;gap:10px}
.msg{display:flex;gap:8px;max-width:88%;animation:fade .3s}
.msg.cat{align-self:flex-start}.msg.me{align-self:flex-end;flex-direction:row-reverse}
.msg .ava{width:30px;height:30px;border-radius:50%;background:linear-gradient(150deg,#3d2a8c,#6d4aff);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.bub{padding:11px 14px;border-radius:16px;font-size:14.7px;line-height:1.62}
.cat .bub{background:var(--cat);border-top-left-radius:5px}.me .bub{background:var(--me);border-top-right-radius:5px;color:#fff}
.bub b{color:var(--gold);font-weight:700}.bub .pl{font-size:11.5px;color:var(--acc);font-weight:700;display:block;margin-bottom:3px}
.synthb{background:linear-gradient(150deg,#33265f,#3d2a8c)!important;border:1px solid #4a3a8a}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.typing{display:flex;gap:4px;padding:12px 14px}.typing span{width:7px;height:7px;border-radius:50%;background:var(--mute);animation:bl 1s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,60%,100%{opacity:.3}30%{opacity:1}}
.cards{display:flex;gap:7px;flex-wrap:wrap}
.tc{width:78px;text-align:center}
.tc img{width:78px;height:126px;object-fit:cover;border-radius:9px;border:1px solid #4a3a8a;box-shadow:0 5px 14px rgba(0,0,0,.4);background:#241a3d}
.tc.rev img{transform:rotate(180deg)}
.tc .cn{font-size:10.5px;margin-top:4px;font-weight:600;line-height:1.2}
.tc .or{font-size:9.5px;color:var(--mute)}.tc.rev .or{color:#e6b8d0}
.quick{align-self:flex-start;display:flex;flex-wrap:wrap;gap:7px;max-width:97%;padding-left:38px}
.qb{background:var(--card);border:1px solid var(--acc);border-radius:100px;padding:8px 13px;font-size:13.5px;font-weight:600;color:var(--soft);cursor:pointer}
.qb:active{transform:scale(.96)}.qb.solid{background:linear-gradient(90deg,#6d4aff,#a78bff);color:#fff;border:none}
.grpt{align-self:flex-start;font-size:11.5px;color:var(--mute);padding-left:38px;margin-top:4px;font-weight:700}
.refs{align-self:flex-start;max-width:88%;margin-left:38px;background:rgba(255,255,255,.03);border:1px dashed #4a3a8a;border-radius:12px;padding:10px 12px}
.refs .rt{font-size:11px;font-weight:700;color:var(--acc);cursor:pointer}
.cs{display:inline-block;background:#2b2150;color:#d9ccff;border-radius:100px;padding:3px 9px;font-size:11px;margin:3px 4px 0 0}
/* splash */
#splash{position:fixed;inset:0;max-width:460px;margin:0 auto;background:#201640;z-index:200;display:flex;align-items:center;justify-content:center;transition:opacity .6s}
#splash img{width:100%;height:100%;object-fit:contain}
#splash .sp-tap{position:absolute;bottom:44px;left:0;right:0;text-align:center;color:#e9e2cf;font-size:12.5px;letter-spacing:.14em;opacity:.85;animation:sblink 1.6s infinite}
@keyframes sblink{50%{opacity:.3}}
#splash.hide{opacity:0;pointer-events:none}
/* brand text logo (atlas-inspired) */
.emblem{width:34px;height:34px;border-radius:50%;object-fit:cover;border:1px solid var(--gold);box-shadow:0 0 0 2px rgba(255,217,138,.15)}
.brand .bnm{font-family:"Cinzel",Georgia,serif;font-size:18px;font-weight:700;letter-spacing:.14em;color:#e9e2cf;line-height:1.1}
.brand .bst{font-family:"Cinzel",serif;font-size:10px;color:var(--mute);letter-spacing:.12em;margin-top:1px}
.hero{text-align:center;margin:8px 0 12px}
.hl-top{font-family:"Cinzel",serif;font-size:11px;letter-spacing:.3em;color:var(--gold);opacity:.85}
.hl-emb{width:78px;height:78px;border-radius:50%;object-fit:cover;border:1.5px solid var(--gold);margin:12px auto 10px;display:block;box-shadow:0 6px 22px rgba(0,0,0,.4),0 0 0 4px rgba(255,217,138,.1)}
.hl-main{font-family:"Cinzel",Georgia,serif;font-size:44px;font-weight:700;letter-spacing:.12em;color:#e9e2cf;margin:2px 0 3px;text-shadow:0 2px 16px rgba(0,0,0,.45)}
.hl-sub{font-family:"Cinzel",serif;font-size:11.5px;color:var(--soft);letter-spacing:.14em}
/* 셔플 애니메이션 (v1 스타일) */
.shuffle{height:150px;display:flex;justify-content:center;align-items:center;position:relative;margin:4px 0}
.shuffle .sc{position:absolute;width:84px;height:134px;border-radius:10px;background:radial-gradient(circle at 50% 42%,rgba(255,217,138,.18),transparent 60%),repeating-linear-gradient(45deg,#302456 0 7px,#271d47 7px 14px);border:1px solid var(--gold);box-shadow:0 6px 18px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;transform-origin:bottom center}
.shuffle .sc::after{content:"✦";color:var(--gold);font-size:20px;opacity:.85}
.shuffle .sc:nth-child(1){animation:shf 1.3s ease-in-out infinite}
.shuffle .sc:nth-child(2){animation:shf 1.3s ease-in-out infinite .1s}
.shuffle .sc:nth-child(3){animation:shf 1.3s ease-in-out infinite .2s}
.shuffle .sc:nth-child(4){animation:shf 1.3s ease-in-out infinite .3s}
.shuffle .sc:nth-child(5){animation:shf 1.3s ease-in-out infinite .4s}
@keyframes shf{0%{transform:translateX(0) rotate(0)}25%{transform:translateX(-56px) rotate(-13deg)}50%{transform:translateX(0) rotate(0)}75%{transform:translateX(56px) rotate(13deg)}100%{transform:translateX(0) rotate(0)}}
/* 카드 선택 팬 */
.fanwrap{align-self:stretch;margin:4px 0 2px}
.fancount{text-align:center;font-size:12.5px;color:var(--gold);margin-bottom:6px;font-weight:700;letter-spacing:.03em}
.fan{display:flex;overflow-x:auto;padding:18px 14px 12px;-webkit-overflow-scrolling:touch}
.fb{flex:0 0 auto;width:50px;height:82px;margin-left:-13px;border-radius:8px;background:radial-gradient(circle at 50% 40%,rgba(255,217,138,.16),transparent 60%),repeating-linear-gradient(45deg,#302456 0 6px,#271d47 6px 12px);border:1px solid var(--gold);box-shadow:0 4px 10px rgba(0,0,0,.4);cursor:pointer;transition:transform .18s;display:flex;align-items:center;justify-content:center}
.fb:first-child{margin-left:0}
.fb::after{content:"✦";color:var(--gold);font-size:13px;opacity:.65}
.fb.sel{transform:translateY(-16px);border-color:#fff;box-shadow:0 8px 18px rgba(255,217,138,.45)}
/* 딜(공개) 효과 */
.tc.deal{animation:deal .5s cubic-bezier(.2,.8,.2,1) both}
@keyframes deal{from{opacity:0;transform:translateY(-24px) scale(.85)}to{opacity:1;transform:none}}
.pagefoot{flex-shrink:0;text-align:center;font-family:"Cinzel",serif;font-size:9.5px;color:var(--mute);padding:8px 10px calc(8px + env(safe-area-inset-bottom));border-top:1px solid var(--line);letter-spacing:.08em;background:rgba(18,13,36,.7)}
.pagefoot b{color:#e9e2cf;font-weight:700}
.shufwrap{align-self:stretch;display:flex;justify-content:center;margin:2px 0}
.spread{align-self:stretch;display:flex;justify-content:center;padding:8px 2px 4px}
.srow{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.tc .plab{font-size:9.5px;color:var(--acc);font-weight:700;margin-bottom:3px;min-height:12px;line-height:1.2}
.celtic{display:flex;gap:10px;justify-content:center;align-items:center}
.cx{display:grid;grid-template-columns:repeat(3,46px);grid-template-rows:repeat(3,74px);gap:6px;place-items:center}
.cx .p5{grid-column:2;grid-row:1}.cx .p4{grid-column:1;grid-row:2}.cx .pc{grid-column:2;grid-row:2}.cx .p6{grid-column:3;grid-row:2}.cx .p3{grid-column:2;grid-row:3}
.mcw{position:relative;width:46px;height:74px}
.pc{position:relative;width:46px;height:74px}
.pc .c1{position:absolute;inset:0}
.pc .c2{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(90deg);z-index:2}
.mc{width:46px;height:74px;border-radius:6px;object-fit:cover;border:1px solid #4a3a8a;box-shadow:0 3px 8px rgba(0,0,0,.45);display:block}
.mc.rev{transform:rotate(180deg)}
.cxnum{position:absolute;top:-6px;left:-5px;background:var(--gold);color:#2a1d05;font-size:9px;font-weight:800;border-radius:50%;width:15px;height:15px;display:flex;align-items:center;justify-content:center;z-index:5}
.staff{display:flex;flex-direction:column;gap:6px}
canvas{display:none}
</style></head>

로 신호를 애써 못 본 척하고 있어요.","베일(석류)","내면화"],"wellbeing|major_02|reversed|selfcare":["억눌린 피로","몸이 보내는 신호에 귀를 기울여 보세요. 오늘은 평소보다 조금 일찍 쉬는 게 필요해요.","쌓인 피로 신호를 애써 못 본 척하고 있어요.","베일(석류)","내면화"],"wellbeing|major_03|upright|energy_now":["편안한 충만","지금 당신은 편안하고 충만한 에너지예요. 스스로를 돌보는 여유가 있어요.","몸과 마음이 넉넉히 채워지는 자리예요.","풍요의 밀밭",""],"wellbeing|major_03|upright|selfcare":["편안한 충만","나를 위한 감각적인 것 하나를 누려보세요. 좋은 향·따뜻한 차·맛있는 한 끼가 마음을 채워요.","몸과 마음이 넉넉히 채워지는 자리예요.","풍요의 밀밭",""],"wellbeing|major_03|reversed|energy_now":["소홀해진 돌봄","지금은 자기돌봄이 뒤로 밀려 기운이 허전한 상태예요.","남을 챙기느라 정작 나를 못 돌보고 있어요.","풍요의 밀밭","부족"],"wellbeing|major_03|reversed|selfcare":["소홀해진 돌봄","오늘만큼은 나를 우선에 두세요. 나를 위한 작은 돌봄 하나가 마른 기운을 채워요.","남을 챙기느라 정작 나를 못 돌보고 있어요.","풍요의 밀밭","부족"],"wellbeing|major_04|upright|energy_now":["안정된 리듬","지금 당신은 규칙적이고 안정된 리듬 안에 있어요. 생활의 틀이 든든해요.","규칙적인 리듬이 몸을 든든히 지탱해요.","숫양 왕좌",""],"wellbeing|major_04|upright|selfcare":["안정된 리듬","이 안정된 리듬을 지켜보세요. 자고 일어나는 시간을 일정하게 두는 것만으로 컨디션이 단단해져요.","규칙적인 리듬이 몸을 든든히 지탱해요.","숫양 왕좌",""],"wellbeing|major_04|reversed|energy_now":["긴장과 과로","지금은 긴장이나 과로로 몸이 뻣뻣하게 굳은 상태예요.","긴장이 지나쳐 몸과 마음이 굳어 있어요.","숫양 왕좌","과함"],"wellbeing|major_04|reversed|selfcare":["긴장과 과로","어깨와 마음의 힘을 한 번 빼보세요. 짧은 스트레칭이나 산책이 굳은 긴장을 풀어줘요.","긴장이 지나쳐 몸과 마음이 굳어 있어요.","숫양 왕좌","과함"],"wellbeing|major_05|upright|energy_now":["안정된 루틴","지금 당신은 안정된 루틴과 건강한 습관 안에 있어요. 익숙한 리듬이 편안해요.","검증된 습관이 든든한 안내가 돼요.","삼중관",""],"wellbeing|major_05|upright|selfcare":["안정된 루틴","검증된 나만의 돌봄 습관을 이어가세요. 필요하면 믿을 만한 사람의 조언을 구하는 것도 좋아요.","검증된 습관이 든든한 안내가 돼요.","삼중관",""],"wellbeing|major_05|reversed|energy_now":["흐트러진 리듬","지금은 평소의 리듬에서 벗어나 생활이 흐트러진 상태예요.","익숙한 틀에서 벗어나 리듬이 흔들려요.","삼중관","내면화"],"wellbeing|major_05|reversed|selfcare":["흐트러진 리듬","작은 루틴 하나를 다시 세워보세요. 아침 물 한 잔 같은 기본이 리듬을 되돌려줘요.","익숙한 틀에서 벗어나 리듬이 흔들려요.","삼중관","내면화"],"wellbeing|major_06|upright|energy_now":["마음의 조화","지금 당신은 마음이 편안히 조화를 이룬 상태예요. 몸과 마음이 어우러져요.","몸과 마음이 조화롭게 어우러지는 자리예요.","천사",""],"wellbeing|major_06|upright|selfcare":["마음의 조화","나를 기분 좋게 하는 것과 함께하세요. 좋아하는 사람·음악·공간이 에너지를 채워줘요.","몸과 마음이 조화롭게 어우러지는 자리예요.","천사",""],"wellbeing|major_06|reversed|energy_now":["갈등에 지침","지금은 마음속 갈등이나 고민으로 기운이 빠진 상태예요.","내적 갈등이 기운을 갉아먹고 있어요.","천사","막힘"],"wellbeing|major_06|reversed|selfcare":["갈등에 지침","마음을 무겁게 하는 것을 종이에 적어보세요. 꺼내어 보면 마음이 한결 가벼워져요.","내적 갈등이 기운을 갉아먹고 있어요.","천사","막힘"],"wellbeing|major_07|upright|energy_now":["추진하는 활력","지금 당신은 활력이 넘치고 추진력이 붙어 있어요. 움직이고 싶은 기운이 돌아요.","목표를 향한 활기가 몸을 이끄는 자리예요.","흑백 스핑크스",""],"wellbeing|major_07|upright|selfcare":["추진하는 활력","이 에너지를 건강하게 써보세요. 가벼운 운동으로 몸을 움직이면 활력이 더 살아나요.","목표를 향한 활기가 몸을 이끄는 자리예요.","흑백 스핑크스",""],"wellbeing|major_07|reversed|energy_now":["조급한 소진","지금은 조급함에 자신을 몰아붙여 지쳐가는 상태예요.","몰아붙이는 마음이 몸을 지치게 해요.","흑백 스핑크스","과함"],"wellbeing|major_07|reversed|selfcare":["조급한 소진","속도를 한 박자 늦춰보세요. 오늘 하나쯤은 내일로 미뤄도 괜찮아요.","몰아붙이는 마음이 몸을 지치게 해요.","흑백 스핑크스","과함"],"wellbeing|major_08|upright|energy_now":["회복력","지금 당신은 어려움을 견디는 내면의 회복력이 있어요. 부드럽게 자신을 다스려요.","부드러운 힘으로 스스로를 다독이는 자리예요.","사자와 여인",""],"wellbeing|major_08|upright|selfcare":["회복력","자신에게 다정하게 대해주세요. 힘든 순간 스스로를 다그치지 않는 것이 회복의 힘이 돼요.","부드러운 힘으로 스스로를 다독이는 자리예요.","사자와 여인",""],"wellbeing|major_08|reversed|energy_now":["기력 저하","지금은 기력이 떨어지고 마음의 힘이 소진된 상태예요.","기운이 소진되어 스스로를 다그쳐요.","사자와 여인","부족"],"wellbeing|major_08|reversed|selfcare":["기력 저하","성취보다 회복을 먼저 챙기세요. 잘 자고 잘 먹는 기본이 지금은 가장 중요해요.","기운이 소진되어 스스로를 다그쳐요.","사자와 여인","부족"],"wellbeing|major_09|upright|energy_now":["혼자만의 재충전","지금 당신은 혼자만의 시간으로 조용히 재충전하고 있어요. 고요함이 필요한 때예요.","조용히 혼자 기운을 채우는 자리예요.","등불(별)",""],"wellbeing|major_09|upright|selfcare":["혼자만의 재충전","혼자만의 쉼을 허락하세요. 조용히 산책하거나 좋아하는 것에 몰두하며 기운을 채워요.","조용히 혼자 기운을 채우는 자리예요.","등불(별)",""],"wellbeing|major_09|reversed|energy_now":["고립과 무기력","지금은 지나친 고립으로 기운이 가라앉고 무기력한 상태예요.","혼자만 있다 무기력에 가라앉고 있어요.","등불(별)","과함"],"wellbeing|major_09|reversed|selfcare":["고립과 무기력","작은 연결을 만들어 보세요. 가벼운 안부나 잠깐의 외출이 무기력을 덜어줘요.","혼자만 있다 무기력에 가라앉고 있어요.","등불(별)","과함"],"wellbeing|major_10|upright|energy_now":["회복의 국면","지금 당신의 컨디션은 전환의 국면에 있어요. 흐름이 좋게 바뀌고 있어요.","리듬이 바뀌며 기운이 돌아오는 자리예요.","바퀴",""],"wellbeing|major_10|upright|selfcare":["회복의 국면","바뀌는 리듬을 반갑게 맞아보세요. 새로운 루틴 하나를 더하면 회복에 탄력이 붙어요.","리듬이 바뀌며 기운이 돌아오는 자리예요.","바퀴",""],"wellbeing|major_10|reversed|energy_now":["컨디션 기복","지금은 컨디션의 기복이 있어 리듬이 잘 안 잡히는 상태예요.","컨디션이 오르내려 흐름이 잡히지 않아요.","바퀴","막힘"],"wellbeing|major_10|reversed|selfcare":["컨디션 기복","바꿀 수 없는 기복은 흘려보내세요. 잘 잔 날을 기록해두면 나만의 리듬이 보여요.","컨디션이 오르내려 흐름이 잡히지 않아요.","바퀴","막힘"],"wellbeing|major_11|upright|energy_now":["절제된 균형","지금 당신은 절제와 균형이 잡힌 생활을 하고 있어요. 몸과 마음이 편안해요.","균형 잡힌 생활이 몸을 편안하게 해요.","저울",""],"wellbeing|major_11|upright|selfcare":["절제된 균형","이 균형을 지켜보세요. 일과 쉼, 활동과 휴식의 저울을 고르게 두는 게 컨디션의 열쇠예요.","균형 잡힌 생활이 몸을 편안하게 해요.","저울",""],"wellbeing|major_11|reversed|energy_now":["무너진 균형","지금은 생활 균형이 무너져 몸이 힘들어하는 상태예요.","생활의 균형이 한쪽으로 기울어 있어요.","저울","막힘"],"wellbeing|major_11|reversed|selfcare":["무너진 균형","기울어진 것 하나를 바로잡아 보세요. 미뤄둔 휴식이나 식사를 챙기면 균형이 돌아와요.","생활의 균형이 한쪽으로 기울어 있어요.","저울","막힘"],"wellbeing|major_12|upright|energy_now":["멈춤과 재충전","지금 당신은 잠시 멈춰 재충전이 필요한 자리예요. 내려놓는 시간이 도움이 돼요.","잠시 멈춰 내려놓고 쉬어가는 자리예요.","거꾸로 매달림",""],"wellbeing|major_12|upright|selfcare":["멈춤과 재충전","오늘은 아무것도 안 하는 시간을 허락하세요. 잠깐의 멈춤이 오히려 새 기운을 줘요.","잠시 멈춰 내려놓고 쉬어가는 자리예요.","거꾸로 매달림",""],"wellbeing|major_12|reversed|energy_now":["가라앉은 정체","지금은 멈춤이 길어져 몸도 마음도 가라앉은 상태예요.","멈춤이 길어져 무기력에 가라앉아요.","거꾸로 매달림","과함"],"wellbeing|major_12|reversed|selfcare":["가라앉은 정체","아주 작은 움직임부터 시작하세요. 창문을 열고 바람을 쐬는 것만으로 흐름이 생겨요.","멈춤이 길어져 무기력에 가라앉아요.","거꾸로 매달림","과함"],"wellbeing|major_13|upright|energy_now":["습관의 재생","지금 당신은 낡은 생활 습관을 정리하고 새로워지려는 자리예요.","낡은 습관을 놓고 새로 시작하는 문턱이에요.","백마",""],"wellbeing|major_13|upright|selfcare":["습관의 재생","몸에 안 맞는 습관 하나를 오늘 비워보세요. 작은 정리가 새 활력의 시작이 돼요.","낡은 습관을 놓고 새로 시작하는 문턱이에요.","백마",""],"wellbeing|major_13|reversed|energy_now":["놓지 못한 습관","지금은 안 좋은 습관을 알면서도 놓지 못해 몸이 무거운 상태예요.","바꿔야 할 습관을 놓지 못하고 있어요.","백마","막힘"],"wellbeing|major_13|reversed|selfcare":["놓지 못한 습관","한 번에 다 바꾸려 말고, 오늘 딱 하나만 쉬어보세요. 작은 시작이 변화를 열어요.","바꿔야 할 습관을 놓지 못하고 있어요.","백마","막힘"],"wellbeing|major_14|upright|energy_now":["중용의 건강","지금 당신은 절제와 조화로 컨디션 , 하나씩 카드로 풀어볼게요."],"money":["돈에 대한 걱정, 누구에게나 있죠. 흐름을 차분히 살펴볼게요.","재물의 지금 흐름을 함께 들여다볼게요.","조급한 마음 잠시 내려놓고, 카드가 건네는 흐름을 봐요.","무엇이 걱정인지 카드에 실어, 천천히 짚어볼게요.","숫자보다 흐름을 봐요. 오늘 카드가 건네는 이야기예요.","재물의 물음, 마음가짐부터 함께 정리해볼게요."],"relation":["그 사람과의 사이가 마음에 걸렸죠. 양쪽을 함께 들여다볼게요.","관계의 엉킨 실타래, 카드로 천천히 풀어볼게요.","누구의 잘못을 따지기보다, 두 사람의 마음을 나란히 봐요.","부딪힘 속에 지쳤을 텐데, 실마리를 함께 찾아봐요.","상대의 속내까지 함께 살피며, 풀어갈 길을 봐요.","관계의 지금을 차분히, 양쪽 시선으로 들여다볼게요."],"self":["요즘의 나, 스스로도 잘 모를 때가 있죠. 카드와 함께 들여다봐요.","지금 내 마음이 어떤지, 카드에 비춰볼게요.","나를 알아가는 시간, 천천히 함께해요.","복잡한 마음 그대로 안고, 오늘의 나를 살펴볼게요.","무엇을 느끼고 있는지, 카드가 거울처럼 비춰줄 거예요.","나에게 건네는 다정한 물음으로 카드를 펼쳐요."],"study":["공부의 고민, 혼자 무겁지 않게 함께 봐요.","지금 학업의 흐름을 카드로 짚어볼게요.","애쓰는 마음 알아요. 오늘 카드가 건네는 이야기를 들어봐요.","조급함 잠시 내려놓고, 공부의 흐름을 살펴볼게요.","무엇이 걱정인지 카드에 실어, 천천히 풀어볼게요.","당신의 노력에 카드가 건네는 한마디를 봐요."],"wellbeing":["요즘 지쳐 있었죠. 오늘은 나를 돌보는 이야기를 해요.","몸과 마음의 지금 상태를 다정히 살펴볼게요.","무리하지 않아도 돼요. 카드가 건네는 돌봄의 이야기를 봐요.","지친 하루 끝에, 나를 위한 카드를 펼쳐요.","에너지의 흐름을 함께 들여다보며 쉼을 찾아봐요.","스스로를 다그치지 말고, 오늘의 나를 돌봐요."]},"advice":{"calm_hopeful":["지금의 흐름을 믿고, 조급해하지 않아도 괜찮아요.","마음이 이끄는 방향을 조금 더 따라가 봐도 좋아요.","서두르기보다 지금의 리듬을 지키는 게 도움이 될 거예요.","당신이 이미 잘 해오고 있다는 걸 잊지 마세요.","작은 한 걸음이면 충분해요. 그 방향이 맞아요.","지금 느끼는 좋은 예감을 소중히 여겨도 돼요.","무리하지 않는 선에서, 마음을 조금 더 내어봐도 좋아요.","이 흐름 위에서, 당신의 선택을 믿어도 괜찮아요."],"gentle_care":["지금은 애쓰기보다, 잠시 나를 돌보는 게 먼저예요.","막힌 듯 느껴져도, 곧 흐름이 풀릴 거예요. 조급해 말아요.","스스로를 다그치지 말고, 한 박자 쉬어가도 괜찮아요.","지금의 답답함은 지나가는 국면이에요. 너무 걱정 말아요.","무엇이 마음을 무겁게 하는지 살피는 것만으로 충분해요.","완벽하지 않아도 돼요. 오늘은 나에게 조금 너그러워도 좋아요.","놓아야 할 것을 놓으면, 마음이 한결 가벼워질 거예요.","지금은 나아가기보다 회복할 때예요. 그래도 괜찮아요."]},"remedy":{"career":["내일 할 일 딱 세 가지만 적어 통제감을 되찾아보세요.","책상 한 곳을 정리하며 마음도 함께 비워보세요.","선택지의 장단점을 각각 한 줄씩 적어보세요.","신뢰하는 사람에게 지금의 고민을 가볍게 털어놓아 보세요.","오늘의 작은 성취 하나를 스스로 칭찬해주세요."],"love":["자기 전, 상대에게 못 보낸 마음을 메모장에 한 줄 적고 조용히 닫아보세요.","좋아하는 향을 켜고, 오롯이 나를 위한 10분을 보내세요.","먼저 건넬 다정한 말 한마디를 미리 준비해두세요.","오늘 감사한 순간 하나를 떠올리며 하루를 마무리하세요.","거울 앞에서 나에게 다정한 한마디를 건네보세요."],"money":["통장 잔액 대신 '모으는 목표'를 눈에 보이는 곳에 적어두세요.","오늘 새어나간 작은 지출 하나를 점검해보세요.","꼭 필요한 것과 아닌 것을 한 줄씩 나눠  if(n>1){const t=typing();await wait(620);t.remove();bubble('<b>✦ 종합</b><br>'+synth(n,g),'cat');chat.lastChild.querySelector('.bub').classList.add('synthb');sc();}
 const tone=cards[0].o==='upright'?'calm_hopeful':'gentle_care';
 await catSay('💬 '+pick(BANK.advice[tone],seed+'a'),560);

function cardsHtml(cards){return '<div class="cards">'+cards.map((c,i)=>{const cd=CARDS[c.id];return '<div class="tc deal '+(c.o==='reversed'?'rev':'')+'" style="animation-delay:'+(i*0.11)+'s"><img src="'+imgsrc(c.id)+'" alt="'+cd.ko+'" loading="lazy"><div class="cn">'+cd.ko+'</div><div class="or">'+(c.o==='reversed'?'역':'정')+'</div></div>';}).join('')+'</div>';}
function spreadHtml(cards,labels,celtic){if(celtic)return celticHtml(cards);return '<div class="srow">'+cards.map(function(c,i){var cd=CARDS[c.id];return '<div class="tc deal '+(c.o==='reversed'?'rev':'')+'" style="animation-delay:'+(i*0.1)+'s"><div class="plab">'+labels[i]+'</div><img src="'+imgsrc(c.id)+'" alt="'+cd.ko+'" loading="lazy"><div class="cn">'+cd.ko+'</div><div class="or">'+(c.o==='reversed'?'역':'정')+'</div></div>';}).join('')+'</div>';}
function celticHtml(cards){function mc(c){return '<img class="mc '+(c.o==='reversed'?'rev':'')+'" src="'+imgsrc(c.id)+'" alt="'+CARDS[c.id].ko+'" loading="lazy">';}function w(c,i,cls){return '<div class="mcw '+cls+'"><span class="cxnum">'+(i+1)+'</span>'+mc(c)+'</div>';}var cross='<div class="cx">'+w(cards[4],4,'p5')+w(cards[3],3,'p4')+'<div class="pc"><span class="cxnum">1</span><div class="c1">'+mc(cards[0])+'</div><div class="c2">'+mc(cards[1])+'</div></div>'+w(cards[5],5,'p6')+w(cards[2],2,'p3')+'</div>';var staff='<div class="staff">'+[9,8,7,6].map(function(i){return w(cards[i],i,'st');}).join('')+'</div>';return '<div class="celtic">'+cross+staff+'</div>';}
function saveJournal(cat,sub,cards){let j=JSON.parse(localStorage.getItem('ktaro_j')||'[]');j.unshift({t:sub,e:cat.e,d:td(),card:CARDS[cards[0].id].ko});j=j.slice(0,8);localStorage.setItem('ktaro_j',JSON.stringify(j));}

async function share(){const r=window._R;if(!r)return;await (document.fonts?document.fonts.ready:Promise.resolve());

 x.textAlign='center';x.fillStyle='#ffd98a';x.font="700 62px 'Cinzel',Georgia,serif";x.fillText('ATLAS',540,150);
 x.fillStyle='#d9ccff';x.font='400 34px Pretendard,sans-serif';x.fillText(r.cat.e+' '+r.sub,540,205);
 const im=new Image();im.src=imgsrc(r.cards[0].id);await new Promise(res=>{im.onload=res;im.onerror=res;});
 const cw=300,ch=486,cx=(1080-cw)/2,cy=270;try{x.save();if(r.cards[0].o==='reversed'){x.translate(cx+cw/2,cy+ch/2);x.rotate(Math.PI);x.drawImage(im,-cw/2,-ch/2,cw,ch);}else x.drawImage(im,cx,cy,cw,ch);x.restore();}catch(e){}
 x.fillStyle='#fff';x.font='800 52px Pretendard,sans-serif';x.fillText(CARDS[r.cards[0].id].ko+(r.cards[0].o==='reversed'?' (역)':''),540,880);
 x.fillStyle='#efeaff';x.font='400 40px Pretendard,sans-serif';wrap(x,r.synthTxt,540,970,900,58);
 x.fillStyle='#c9bdf0';x.font='400 34px Pretendard,sans-serif';wrap(x,'✦ '+r.remedy,540,1520,900,50);
 x.fillStyle='#8b7fb5';x.font='400 30px Pretendard,sans-serif';x.fillText('ATLAS · The Astro-Compass · '+td(),540,1840);
 const a=document.createElement('a');a.href=cv.toDataURL('image/png');a.download='atlas_'+td()+'.png';a.click();}
function wrap(ctx,t,cx,cy,mw,lh){const w=t.split(' ');let l='',y=cy;for(const wd of w){const ts=l+wd+' ';if(ctx.measureText(ts).width>mw&&l){ctx.fillText(l.trim(),cx,y);l=wd+' ';y+=lh;}else l=ts;}ctx.fillText(l.trim(),cx,y);}
function hideSplash(){const sp=document.getElementById('splash');if(!sp)return;sp.classList.add('hide');setTimeout(()=>sp.remove(),650);}
setTimeout(hideSplash,2600);
showMain();
